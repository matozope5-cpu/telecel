<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telecel – Service Unavailable</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 360px;
      background: #f7f7f7;
      border-radius: 28px;
      padding: 40px 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    /* top red shape (signature) */
    .top-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 220px;
      height: 220px;
      background: linear-gradient(135deg, rgba(255, 0, 0, 0.25), rgba(255, 0, 0, 0.6));
      border-bottom-left-radius: 120px;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    .logo-circle {
      width: 56px;
      height: 56px;
      background: #ff0000;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      margin: 0 auto 10px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .logo-text {
      color: #ff0000;
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 15px;
    }

    p {
      color: #666;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .btn {
      background: #ff0000;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 8px 20px rgba(255, 0, 0, 0.3);
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #e60000;
      transform: scale(1.02);
    }

    .version {
      color: #aaa;
      font-size: 12px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bg"></div>
    <div class="content">
      <div class="logo-circle">t</div>
      <div class="logo-text">telecel</div>
      <h2>Service Unavailable</h2>
      <p>We are currently performing maintenance.<br>Please check again in a short while.</p>
      <a href="index.html" class="btn">Try Again</a>
      <div class="version">v26.2.2(TPA-2622)</div>
    </div>
  </div>
</body>
</html>
